<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
}

/* 登录 */
#login {
  position: fixed; inset: 0;
  background: #0b0b0b;
  display: flex; justify-content: center; align-items: center; flex-direction: column;
  z-index: 100;
}

.login-inner { width: 420px; text-align: center; }
.login-inner p { font-size: 12px; letter-spacing: 4px; opacity: .4; margin-bottom: 35px; }

input.key {
  width: 100%; padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ✅ 问题弹窗 */
#question {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(6px);
  z-index: 500;
  justify-content: center; align-items: center;
}

.q-box {
  background: rgba(30,41,59,.95);
  padding: 36px 34px;
  border-radius: 18px;
  width: 92%; max-width: 460px;
  box-shadow: 0 25px 60px rgba(0,0,0,.45);
}

.q-box h3 {
  font-size: 16px;
  font-weight: 500;
  color: #7dd3fc;
  margin-bottom: 22px;
  line-height: 1.8;
  text-align: center;
}

.q-box textarea {
  width: 100%;
  min-height: 110px;
  background: #0f172a;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 12px;
  padding: 16px;
  color: #e5e7eb;
  font-size: 15px;
  line-height: 1.8;
  resize: none;
  outline: none;
}

.q-box button {
  margin-top: 22px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg,#38bdf8,#0ea5e9);
  color: #fff;
  font-size: 15px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .25s ease;
}

.q-box button:hover {
  filter: brightness(1.1);
}

/* 主界面 */
#main {
  display: none;
  position: fixed; inset: 0;
  background: #2a3649;
  z-index: 10;
  padding: 60px 80px;
  overflow-y: auto;
}

.main-header {
  font-size: 13px;
  opacity: .5;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.item {
  padding: 18px 22px;
  background: rgba(255,255,255,.06);
  border-left: 3px solid rgba(56,189,248,.6);
  border-radius: 6px;
  cursor: pointer;
}

.item:hover {
  background: rgba(255,255,255,.09);
}

/* 过去时间线 */
#past {
  display: none;
  position: fixed; inset: 0;
  background: #0f172a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
}

.timeline {
  position: relative;
  padding-left: 30px;
  border-left: 2px solid rgba(255,255,255,.08);
}

.node {
  position: relative;
  margin-bottom: 50px;
  cursor: pointer;
}

.node::before {
  content: "";
  position: absolute;
  left: -41px;
  top: 4px;
  width: 10px;
  height: 10px;
  background: #38bdf8;
  border-radius: 50%;
}

.node-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 6px;
}

/* 模态框 */
.modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 999;
  justify-content: center; align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px 36px;
  border-radius: 12px;
  width: 90%; max-width: 460px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.modal-content {
  font-size: 15px;
  line-height: 1.8;
  color: #cbd5e1;
}

.camera {
  margin-top: 18px;
  width: 48px; height: 48px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: flex; justify-content: center; align-items: center;
  cursor: pointer; font-size: 22px;
}

/* 相册 */
#album {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
}

#album-close {
  position: absolute;
  top: 20px; right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px; left: 30px;
  color: #fff;
  font-size: 14px;
}

/* 右下角入口 */
.gate {
  position: fixed;
  bottom: 30px; right: 30px;
  width: 10px; height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<!-- ✅ 问题弹窗 -->
<div id="question">
  <div class="q-box">
    <h3>
      近三年来，<br>
      你印象最深的一件事是什么？
    </h3>
    <textarea id="answer" placeholder="慢慢写，我会好好保存……"></textarea>
    <button onclick="submitAnswer()">提交</button>
  </div>
</div>

<div id="main">
  <div class="main-header">RECENT LOGS</div>
  <div class="list">
    <div class="item" onclick="openModal('2026-05-25','今天这个小网站正式可以运行了，好有成就感。')">2026-05-25</div>
    <div class="item" onclick="openModal('2026-06-01','系统开始记录新的轨迹。')">2026-06-01</div>
  </div>
</div>

<div id="past">
  <div class="past-header" onclick="closePast()">◀ BACK</div>
  <div class="timeline">
    <div class="node" onclick="openModal('2023-09-11','在武警院我们相遇。不管过去多久我还是想说，很高兴认识你。')">
      <div class="node-time">2023-09-11</div>
    </div>
    <div class="node" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="node-time">2023-06-15</div>
    </div>
  </div>
</div>

<div id="album">
  <div id="album-page"></div>
  <div class="album-btn" style="left:20px;" onclick="prevImg()">‹</div>
  <div style="display:flex;justify-content:center;align-items:center;height:100%;">
    <img src="">
  </div>
  <div class="album-btn" style="right:20px;" onclick="nextImg()">›</div>
  <div id="album-close" onclick="closeAlbum()">✕</div>
</div>

<div class="gate" onclick="openPast()"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
const KEY = "56";

/* ✅ GitHub */
const GITHUB_TOKEN = "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";
const OWNER = "ac091";
const REPO = "log";

const login = document.getElementById("login");
const main = document.getElementById("main");
const question = document.getElementById("question");
const input = document.getElementById("key");

/* ✅ 登录逻辑（核心） */
input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";

    if (!localStorage.getItem("asked")) {
      question.style.display = "flex";
    } else {
      main.style.display = "block";
    }
  }
});

function submitAnswer() {
  const text = document.getElementById("answer").value.trim();
  if (!text) return alert("写点什么嘛～");

  fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`, {
    method: "POST",
    headers: {
      "Authorization": `token ${GITHUB_TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: "💌 登录回答",
      body: `### 回答内容\n\n${text}\n\n---\n🕒 ${new Date().toLocaleString()}`
    })
  })
  .then(res => res.ok ? res.json() : Promise.reject())
  .then(() => {
    localStorage.setItem("asked", "1");
    question.style.display = "none";
    main.style.display = "block";
  })
  .catch(() => {
    alert("提交失败，请检查 Token 或仓库权限");
  });
}

/* ===== 原有功能 ===== */
const photosByDate = {
  "2023-09-11": [
    "https://raw.githubusercontent.com/ac091/log/main/qu.jpg",
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ],
  "2023-06-15": [
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ]
};

let currentPhotos = [], currentIndex = 0;

function openModal(time, content) {
  document.getElementById("modal-time").innerText = time;
  document.getElementById("modal-content").innerHTML = content;

  if (photosByDate[time]) {
    const camera = document.createElement("div");
    camera.className = "camera";
    camera.innerHTML = "📷";
    camera.onclick = () => openAlbum(photosByDate[time]);
    document.getElementById("modal-content").appendChild(camera);
  }

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function openPast() {
  main.style.display = "none";
  document.getElementById("past").style.display = "block";
}

function closePast() {
  document.getElementById("past").style.display = "none";
  main.style.display = "block";
}

function openAlbum(photos) {
  currentPhotos = photos;
  currentIndex = 0;
  document.querySelector("#album img").src = currentPhotos[currentIndex];
  document.getElementById("album-page").innerText =
    `${currentIndex + 1} / ${currentPhotos.length}`;
  document.getElementById("album").style.display = "block";
}

function prevImg() {
  if (currentIndex > 0) {
    currentIndex--;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      `${currentIndex + 1} / ${currentPhotos.length}`;
  }
}

function nextImg() {
  if (currentIndex < currentPhotos.length - 1) {
    currentIndex++;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      `${currentIndex + 1} / ${currentPhotos.length}`;
  }
}

function closeAlbum() {
  document.getElementById("album").style.display = "none";
}
</script>

</body>
</html>
