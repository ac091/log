<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
  cursor: default;
}

/* ===== 登录页 ===== */
#login {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #121829 0%, #000 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(56,189,248,.25);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
  transition: border-color 0.3s;
}
input.key:focus {
  border-color: #38bdf8;
  box-shadow: 0 0 15px rgba(56,189,248,.2);
}

/* ===== 主导航页 ===== */
#nav {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #0c1430 0%, #000000 75%);
  z-index: 50;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}

#nav::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(56,189,248,.7), transparent),
    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 20% 70%, rgba(56,189,248,.5), transparent),
    radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 40% 85%, rgba(56,189,248,.4), transparent),
    radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,.4), transparent);
  pointer-events: none;
  z-index: 0;
}

.nav-title {
  font-size: 12px;
  letter-spacing: 10px;
  color: rgba(255,255,255,.2);
  margin-bottom: 80px;
  z-index: 1;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 40px;
  z-index: 1;
}

.nav-link {
  font-size: 48px;
  font-weight: 600;
  color: #9ca3af;
  letter-spacing: 4px;
  cursor: pointer;
  position: relative;
  transition: color .4s ease;
}

.nav-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -10px;
  width: 0;
  height: 2px;
  background: #38bdf8;
  transition: width .4s ease;
}

.nav-link:hover {
  color: #38bdf8;
}

.nav-link:hover::after {
  width: 100%;
}

/* ===== 现在 - 主时间线 ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: 
    linear-gradient(150deg, #162b5c 0%, #0f1e42 40%, #081024 100%),
    radial-gradient(circle at 15% 15%, rgba(96, 165, 250, 0.25) 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, rgba(56, 189, 248, 0.2) 0%, transparent 55%),
    radial-gradient(circle at 45% 85%, rgba(147, 197, 253, 0.12) 0%, transparent 60%);
  background-blend-mode: screen;
  z-index: 10;
  padding: 60px 80px;
  overflow: hidden;
}
#main::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1.2px 1.2px at 25% 15%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 75% 65%, rgba(56,189,248,0.22), transparent),
    radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.18), transparent),
    radial-gradient(1px 1px at 10% 80%, rgba(56,189,248,0.16), transparent),
    radial-gradient(1px 1px at 92% 22%, rgba(255,255,255,0.2), transparent);
  z-index: 0;
  pointer-events: none;
}

.main-header {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 20px;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 2;
}

.main-header .back-btn {
  cursor: pointer;
  color: #a0aec0;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all .3s ease;
}

.main-header .back-btn:hover {
  color: #38bdf8;
  background: rgba(56,189,248,.15);
}

.timeline-now {
  position: relative;
  width: 100%;
  height: calc(100vh - 120px);
  overflow-y: auto;
  scroll-behavior: smooth;
  z-index: 2;
}

.timeline-now::-webkit-scrollbar {
  width: 6px;
}

.timeline-now::-webkit-scrollbar-thumb {
  background: rgba(56,189,248,.4);
  border-radius: 3px;
}

.timeline-now::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom,
    rgba(56,189,248,.9),
    rgba(56,189,248,.2)
  );
  pointer-events: none;
}

.timeline-item {
  position: relative;
  width: 100%;
  padding: 30px 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #38bdf8;
  box-shadow: 0 0 20px rgba(56,189,248,1), 0 0 40px rgba(56,189,248,.5);
  cursor: pointer;
  transition: transform .3s ease;
  z-index: 2;
  flex-shrink: 0;
}

.dot:hover {
  transform: scale(1.5);
}

.label {
  position: absolute;
  font-size: 20px;
  font-weight: 700;
  color: #7dd3fc;
  opacity: .8;
  cursor: pointer;
  z-index: 2;
  text-shadow: 0 0 8px rgba(124,211,252,0.3);
}

.label:hover {
  opacity: 1;
}

.timeline-item:nth-child(odd) .dot { order: 2; }
.timeline-item:nth-child(odd) .label { order: 1; right: calc(50% + 30px); }
.timeline-item:nth-child(even) .dot { order: 1; }
.timeline-item:nth-child(even) .label { order: 2; left: calc(50% + 30px); }

#main .gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.7);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
  box-shadow: 0 0 10px rgba(56,189,248,.6);
}

/* ===== 过去 - 时间选择 ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: 
    linear-gradient(140deg, #070612 0%, #04030a 50%, #020105 100%),
    radial-gradient(circle at 12% 18%, rgba(60, 40, 110, 0.18) 0%, transparent 45%),
    radial-gradient(circle at 88% 82%, rgba(40, 25, 80, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(30, 20, 60, 0.1) 0%, transparent 70%);
  background-blend-mode: screen;
  z-index: 200;
  overflow: hidden;
}
#past::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 30% 10%, rgba(255,255,255,0.07), transparent),
    radial-gradient(1px 1px at 70% 90%, rgba(120,90,180,0.1), transparent),
    radial-gradient(1.2px 1.2px at 15% 65%, rgba(255,255,255,0.05), transparent),
    radial-gradient(1px 1px at 85% 30%, rgba(100,70,160,0.08), transparent);
  z-index: 0;
  pointer-events: none;
}

#past .past-header {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 14px;
  color: #8888a0;
  cursor: pointer;
  z-index: 10;
}

#yearToggle {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-240px, -68%);
  font-size: 28px;
  color: rgba(200,190,220,.5);
  cursor: pointer;
  z-index: 15;
}

#indexList {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-240px, 30px);
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 15;
  background: rgba(22, 18, 40, 0.94);
  padding: 12px 16px;
  border-radius: 6px;
  border: 1px solid rgba(120,90,180,.25);
}

#indexList div {
  font-size: 13px;
  color: #a78bfa;
  cursor: pointer;
  white-space: nowrap;
}
#indexList div:hover { color: #c4b5fd; }

.picker-center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  position: relative;
  z-index: 5;
}

.date-display {
  font-size: 64px;
  font-weight: 800;
  color: #a78bfa;
  letter-spacing: 4px;
  user-select: none;
  text-shadow: 0 0 18px rgba(167, 139, 250,.5);
}

.confirm-btn {
  margin-top: 60px;
  font-family: monospace;
  font-size: 16px;
  letter-spacing: 8px;
  color: #a78bfa;
  border: 1px solid rgba(167, 139, 250,.45);
  padding: 14px 70px;
  cursor: pointer;
  transition: all .3s ease;
  border-radius: 4px;
}
.confirm-btn:hover {
  background: rgba(167, 139, 250,.12);
  box-shadow: 0 0 12px rgba(167, 139, 250,.25);
}

/* ===== 关键字页面 ===== */
#keywordPage {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #090814, #030208);
  z-index: 250;
  justify-content: center;
  align-items: center;
}

.keyword-back {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 16px;
  color: #8888a0;
  cursor: pointer;
  letter-spacing: 2px;
}

.keyword-box {
  font-size: 56px;
  font-weight: 800;
  color: #e9d5ff;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 2px;
}
.keyword-box:hover {
  color: #a78bfa;
  transform: scale(1.08);
}

/* ===== 内容模态框 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.96);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  width: 80vw;
  max-width: 900px;
  max-height: 85vh;
  padding: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.modal-content {
  font-size: 22px;
  line-height: 1.9;
  color: #d1d5db;
  text-align: center;
  overflow-y: auto;
  width: 100%;
  padding-top: 20px;
}

.modal-back {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 16px;
  color: #8888a0;
  cursor: pointer;
  letter-spacing: 2px;
}
.modal-back:hover { color: #a78bfa; }

.camera {
  margin-top: 40px;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 26px;
}

/* ===== SONG 页面 ===== */
#csPage {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #0c0b18, #141226);
  z-index: 10;
  justify-content: flex-start;
  align-items: center;
  flex-direction: column;
  padding-top: 80px;
}

#csPage .back-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  cursor: pointer;
  color: #8888a0;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all .3s ease;
}
#csPage .back-btn:hover {
  color: #a78bfa;
  background: rgba(167, 139, 250,.1);
}

.cs-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 60px;
  margin-bottom: 60px;
}
.cs-left, .cs-right {
  font-size: 72px;
  font-weight: 900;
  color: #b4b4c8;
  letter-spacing: 8px;
}
.cs-divider {
  width: 1px;
  height: 60px;
  background: rgba(255,255,255,.15);
}
.cs-content {
  display: flex;
  gap: 120px;
}
.cs-column {
  width: 260px;
  color: #777799;
  font-size: 14px;
  text-align: center;
}

/* ===== 原有占位页 ===== */
.page-placeholder {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #090814, #030208);
  z-index: 10;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  color: #8888a0;
}
.page-placeholder .back-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  cursor: pointer;
  font-size: 16px;
  letter-spacing: 2px;
  color: #8888a0;
}

/* ========== 新增：IDEA 二级导航页 ========== */
#idea {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(150deg, #0f172a 0%, #020617 100%);
  z-index: 10;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}
#idea::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(1px 1px at 20% 30%, rgba(148,163,184,0.2), transparent),
              radial-gradient(1px 1px at 80% 60%, rgba(56,189,248,0.15), transparent);
  pointer-events: none;
}
.idea-back {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 16px;
  color: #94a3b8;
  cursor: pointer;
  letter-spacing: 2px;
  z-index: 2;
}
.idea-back:hover { color: #38bdf8; }
.idea-title {
  font-size: 14px;
  letter-spacing: 12px;
  color: rgba(148,163,184,0.3);
  margin-bottom: 70px;
  z-index: 2;
}
.idea-links {
  display: flex;
  flex-direction: column;
  gap: 50px;
  z-index: 2;
}
.idea-link {
  font-size: 42px;
  font-weight: 500;
  color: #94a3b8;
  letter-spacing: 6px;
  cursor: pointer;
  position: relative;
  transition: color 0.4s;
}
.idea-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -8px;
  width: 0;
  height: 2px;
  background: #38bdf8;
  transition: width 0.4s;
}
.idea-link:hover { color: #38bdf8; }
.idea-link:hover::after { width: 100%; }

/* ========== 新增：生活碎片 - 日记页面 ========== */
#diaryPage {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #0b1220, #010409);
  padding: 60px;
  z-index: 20;
}
.diary-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}
.diary-back {
  font-size: 16px;
  color: #94a3b8;
  cursor: pointer;
  letter-spacing: 2px;
}
.diary-back:hover { color: #38bdf8; }
.diary-page-info {
  font-size: 14px;
  color: rgba(148,163,184,0.5);
  letter-spacing: 4px;
}
.diary-container {
  width: 100%;
  height: calc(100vh - 180px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.diary-content {
  max-width: 800px;
  font-size: 20px;
  line-height: 2.2;
  color: #cbd5e1;
  text-align: left;
  padding: 0 20px;
}
.diary-date {
  font-size: 16px;
  color: #38bdf8;
  margin-bottom: 20px;
  letter-spacing: 3px;
}
.diary-paginate {
  display: flex;
  gap: 80px;
  margin-top: 50px;
}
.page-btn {
  font-size: 28px;
  color: #94a3b8;
  cursor: pointer;
  transition: color 0.3s;
  user-select: none;
}
.page-btn:hover { color: #38bdf8; }
.page-btn.disable {
  color: rgba(148,163,184,0.2);
  cursor: not-allowed;
}

/* ========== 新增：如果我是部相机 - 相册页面 ========== */
#cameraPage {
  display: none;
  position: fixed;
  inset: 0;
  background: #020408;
  z-index: 20;
  padding: 60px;
}
.camera-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}
.camera-back {
  font-size: 16px;
  color: #94a3b8;
  cursor: pointer;
  letter-spacing: 2px;
}
.camera-back:hover { color: #38bdf8; }
.camera-page-info {
  font-size: 14px;
  color: rgba(148,163,184,0.5);
  letter-spacing: 4px;
}
.photo-wrap {
  width: 100%;
  height: calc(100vh - 160px);
  display: flex;
  justify-content: center;
  align-items: center;
}
.photo-main {
  max-width: 80%;
  max-height: 80%;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(56,189,248,0.15);
}
.photo-paginate {
  position: absolute;
  width: 100%;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
}

/* ===== 相册全局 ===== */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}
#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}
.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
}
#album-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}
#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

/* ===== 打字机 ===== */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 500;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* ===== 6.4 入口 ===== */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 501;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
#entry .entry-box {
  font-size: 100px;
  font-weight: 950;
  color: #38bdf8;
  text-shadow:
    0 0 20px rgba(56,189,248,.8),
    0 0 60px rgba(56,189,248,.5),
    0 0 120px rgba(56,189,248,.3);
  animation: pulse 2.5s infinite;
  transition: transform .3s ease;
}
#entry:hover .entry-box { transform: scale(1.08); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

/* ===== 生日页面 + 烟花画布 ===== */
#birthday {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 600;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}
#fireworksCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}
#cake {
  font-size: 260px;
  opacity: 0;
  transition: opacity 1.8s ease;
  position: relative;
  z-index: 2;
}
#happy {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 64px;
  letter-spacing: 16px;
  color: #ffd1dc;
  opacity: 0;
  transition: opacity 2s ease;
  text-align: center;
  z-index: 2;
}
#message {
  position: absolute;
  top: 26%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  color: #7dd3fc;
  opacity: 0;
  text-align: center;
  max-width: 80%;
  line-height: 1.8;
  z-index: 2;
}
#closeHint {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  display: none;
  z-index: 2;
}

/* ===== 时空驿站弹窗 ===== */
#pastModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 1000;
}
#pastModal .box {
  position: fixed;
  right: 60px;
  bottom: 60px;
  text-align: left;
  background: rgba(22, 18, 40, 0.88);
  padding: 20px;
  border-radius: 8px;
  border: 1px solid rgba(167, 139, 250,.25);
}
#pastModal .title {

function renderDiary() {
  const total = diaryList.length;
  const item = diaryList[currentDiaryPage];
  document.getElementById("diaryDate").innerText = item.date;
  document.getElementById("diaryContent").innerText = item.text;
  document.getElementById("diaryPageNum").innerText = `PAGE ${currentDiaryPage + 1} / ${total}`;

  const prevBtn = document.getElementById("diaryPrev");
  const nextBtn = document.getElementById("diaryNext");
  prevBtn.classList.toggle("disable", currentDiaryPage === 0);
  nextBtn.classList.toggle("disable", currentDiaryPage === total - 1);

function prevDiary() {
  if(currentDiaryPage > 0){
    currentDiaryPage--;
    renderDiary();
  }

  if(currentDiaryPage < diaryList.length - 1){
    currentDiaryPage++;
    renderDiary();
  }
}

  const prevBtn = document.getElementById("photoPrev");

}

    currentPhotoPage--;
    renderPhoto();
  }
}

  if(currentPhotoPage < photoList.length - 1){

/* ========= 打字机效果 ========= */
function playTypewriter(){
  const el = document.getElementById("typewriter");
  el.style.display = "flex";
  const txt = "Welcome to the time capsule.";
  let i = 0;
  el.innerText = "";
  const timer = setInterval(()=>{
    if(i < txt.length){
      el.innerText += txt[i];
      i++;
    }else{
      clearInterval(timer);
      setTimeout(()=>{
        el.style.display = "none";
        goToNav();
      },1200);
    }
  },80);
}

/* ========= 主时间线渲染 ========= */
function renderTimeline() {
  const c = document.getElementById("timelineNow");
  c.innerHTML = "";
  timelineData.forEach(item => {
    const d = document.createElement("div");
    d.className = "timeline-item";
    d.innerHTML = `
      <div class="dot" onclick="openModal('${item.date}','${item.content.replace(/'/g,"\\'")}')"></div>
      <div class="label" onclick="openModal('${item.date}','${item.content.replace(/'/g,"\\'")}')">${item.date}</div>
    `;
    c.appendChild(d);
  });
}

const photosByDate = {};
function openModal(time, content) {
  modalSource = document.getElementById("main").style.display === "block" ? "main" : "past";

    cam.onclick = () => openAlbum(photosByDate[time]);
    document.getElementById("modal-content").appendChild(cam);

  document.getElementById("keywordPage").style.display = "none";
  document.getElementById("modal").style.display = "flex";
}
function closeModal() {
  document.getElementById("modal").style.display = "none";
  if (modalSource === "past") {
    document.getElementById("past").style.display = "block";
  } else {
    document.getElementById("main").style.display = "block";
  }
}
