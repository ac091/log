<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
  cursor: default;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 现在时间段（✅ 横向时间轴 方案A） ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  z-index: 10;
  padding: 0;
  overflow: hidden;
}

.main-header {
  position: fixed;
  top: 30px;
  left: 80px;
  font-size: 13px;
  opacity: .5;
  letter-spacing: 2px;
  z-index: 15;
}

.timeline-wrapper {
  position: absolute;
  inset: 0;
  cursor: grab;
  overflow: hidden;
}

.timeline-wrapper:active {
  cursor: grabbing;
}

.timeline-track {
  position: absolute;
  display: flex;
  align-items: center;
  transition: transform 0.15s ease-out;
  will-change: transform;
}

/* 时间线（SVG 横线） */
.timeline-svg {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}

.node-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  min-width: 280px;
  padding: 0 20px;
  position: relative;
}

.node-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #38bdf8;
  box-shadow:
    0 0 20px rgba(56,189,248,.9),
    0 0 60px rgba(56,189,248,.4),
    0 0 100px rgba(56,189,248,.2);
  transition: all .3s ease;
  z-index: 2;
  flex-shrink: 0;
}

.node-group:hover .node-dot {
  transform: scale(1.5);
  box-shadow:
    0 0 30px rgba(56,189,248,1),
    0 0 80px rgba(56,189,248,.6),
    0 0 140px rgba(56,189,248,.3);
}

.node-date {
  font-size: 20px;
  font-weight: 700;
  color: #7dd3fc;
  margin-top: 16px;
  opacity: .8;
  transition: opacity .3s ease;
  white-space: nowrap;
}

.node-group:hover .node-date {
  opacity: 1;
}

.node-content {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 8px;
  opacity: 0;
  transform: translateY(8px);
  transition: all .3s ease;
  white-space: nowrap;
  text-align: center;
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.node-group:hover .node-content {
  opacity: 1;
  transform: translateY(0);
}

/* 连接线（节点之间） */
.connector {
  height: 2px;
  background: linear-gradient(90deg,
    rgba(56,189,248,.6),
    rgba(56,189,248,.1)
  );
  flex-shrink: 0;
}

.scroll-hint {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: rgba(255,255,255,.25);
  letter-spacing: 2px;
  z-index: 15;
  animation: hintBlink 2s infinite;
}

@keyframes hintBlink {
  0%, 100% { opacity: .25; }
  50% { opacity: .6; }
}

/* ===== 过去时间段（✅ 残影 + hover 出字） ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0b0f1a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 50px;
}

.memory {
  position: relative;
  width: 280px;
  padding: 24px;
  background: rgba(255,255,255,.06);
  border-radius: 14px;
  cursor: pointer;
  transform: rotateX(10deg) scale(.95);
  transition: all .5s ease;
  opacity: .65;
}

.memory:hover {
  transform: rotateX(0) scale(1);
  opacity: 1;
  background: rgba(255,255,255,.12);
  box-shadow: 0 20px 60px rgba(56,189,248,.25);
}

.memory-date {
  font-size: 32px;
  font-weight: 800;
  color: #38bdf8;
}

.memory-tag {
  font-size: 14px;
  color: #94a3b8;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(10px);
  transition: all .4s ease;
}

.memory:hover .memory-tag {
  opacity: 1;
  transform: translateY(0);
}

/* ===== 模态框 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px 36px;
  border-radius: 12px;
  width: 90%;
  max-width: 460px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.modal-content {
  font-size: 15px;
  line-height: 1.8;
  color: #cbd5e1;
}

.camera {

  width: 48px;
  height: 48px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 22px;
}

/* ===== 相册 ===== */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;

}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);

  font-size: 40px;

#album-close {

  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

.gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}

/* ===== 打字机 ===== */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 500;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* ===== 6.4 ===== */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 501;
  justify-content: center;
  align-items: center;

#entry .entry-box {

}

#entry:hover .entry-box {

@keyframes pulse {

/* ===== 生日 ===== */
#birthday {

  background: #000;

#cake {

#happy {

  transition: opacity 2s ease;

#message {
  position: absolute;
  top: 26%;

  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<script>
/* ===== 时间轴数据（以后加日期就改这里） ===== */
const timelineData = [
  {
    date: "2024-06-04",
    content: "首先祝你生日快乐",
    preview: "生日快乐"
  },
  {
    date: "2026-05-25",
    content: "今天这个小网站正式可以运行了，好有成就感。这是我做的第一个网站，也是第一次正儿八经跑代码，惊喜吧应该，其实这个想法不算突然，只是没法确定代码可以跑起来，可我前两天还是决定先悄悄藏在戒指上，你应该暂时发现不了，上次的八千字讲了很多人很多事，但我想说那并不是全部，这个网站会保持更新的，也会有很多可以探索的地方，这个网站，只关于你，也只属于我们。",
    preview: "网站诞生"
  },
  {
    date: "2026-06-01",
    content: "系统开始记录新的轨迹。",
    preview: "新轨迹"
  },
  {
    date: "2026-06-15",
    content: "未来的某一天，也许会有新的故事写在这里。",
    preview: "未完待续"
  },
  {
    date: "2026-07-01",
    content: "又一个夏天来了，时间过得真快。",
    preview: "夏天"
  },
];

/* ===== 生成时间轴 DOM ===== */
function buildTimeline() {
  const track = document.getElementById("timelineTrack");
  const svgNS = "http://www.w3.org/2000/svg";

  // 参数
  const nodeW = 280;       // 每个节点占宽
  const gapW = 120;        // 节点间间距
  const totalW = timelineData.length * nodeW + (timelineData.length - 1) * gapW;
  const centerY = window.innerHeight / 2;

  // 创建 SVG 背景线
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("class", "timeline-svg");
  svg.setAttribute("width", totalW);
  svg.setAttribute("height", window.innerHeight);
  svg.setAttribute("viewBox", `0 0 ${totalW} ${window.innerHeight}`);

  const defs = document.createElementNS(svgNS, "defs");
  const grad = document.createElementNS(svgNS, "linearGradient");
  grad.setAttribute("id", "lineGlow");
  grad.setAttribute("x1", "0%");
  grad.setAttribute("y1", "0%");
  grad.setAttribute("x2", "100%");
  grad.setAttribute("y2", "0%");

  const stops = [
    { offset: "0%", color: "38bdf8", opacity: "0" },
    { offset: "10%", color: "38bdf8", opacity: "1" },
    { offset: "90%", color: "38bdf8", opacity: "1" },
    { offset: "100%", color: "38bdf8", opacity: "0" },
  ];
  stops.forEach(s => {
    const stop = document.createElementNS(svgNS, "stop");
    stop.setAttribute("offset", s.offset);
    stop.setAttribute("stop-color", `#${s.color}`);
    stop.setAttribute("stop-opacity", s.opacity);
    grad.appendChild(stop);
  });
  defs.appendChild(grad);
  svg.appendChild(defs);

  const path = document.createElementNS(svgNS, "path");
  path.setAttribute("d", `M0,${centerY} L${totalW},${centerY}`);
  path.setAttribute("stroke", "url(#lineGlow)");
  path.setAttribute("stroke-width", "2");
  path.setAttribute("fill", "none");
  svg.appendChild(path);

  track.appendChild(svg);

  // 创建节点
  timelineData.forEach((item, i) => {
    const group = document.createElement("div");
    group.className = "node-group";
    group.style.minWidth = nodeW + "px";
    group.style.padding = `0 ${gapW / 2}px`;
    group.onclick = () => openModal(item.date, item.content);

    // 随机上下偏移（增加灵动感）
    const offsetY = (Math.random() - 0.5) * 60;

    const dot = document.createElement("div");
    dot.className = "node-dot";
    dot.style.marginTop = (centerY - 8 + offsetY) + "px";

    const dateEl = document.createElement("div");
    dateEl.className = "node-date";
    dateEl.textContent = item.date;

    const previewEl = document.createElement("div");
    previewEl.className = "node-content";
    previewEl.textContent = item.preview;

    group.appendChild(dot);
    group.appendChild(dateEl);
    group.appendChild(previewEl);
    track.appendChild(group);
  });

  // 设置初始位置：居中显示中间节点
  const wrapperW = document.getElementById("timelineWrapper").offsetWidth;
  const initialX = (wrapperW - totalW) / 2;
  track.style.transform = `translateX(${initialX}px)`;
  track.style.top = "0";
  track.style.left = "0";
  track.style.width = totalW + "px";
  track.style.height = "100%";
}

/* ===== 拖拽 + 滚轮逻辑 ===== */
function initTimelineInteraction() {
  const wrapper = document.getElementById("timelineWrapper");
  const track = document.getElementById("timelineTrack");

  let isDragging = false;
  let startX = 0;
  let currentX = 0;

  const wrapperW = wrapper.offsetWidth;
  const trackW = track.offsetWidth;
  const minX = Math.min(0, wrapperW - trackW);
  const maxX = 0;

  // 获取当前 translateX
  function getTranslateX() {
    const style = window.getComputedStyle(track).transform;
    if (style === "none") return 0;
    const matrix = style.match(/matrix.*\((.+)\)/)[1].split(", ");
    return parseFloat(matrix[4]);
  }

  // 限制范围
  function clamp(x) {
    return Math.max(minX, Math.min(maxX, x));
  }

  // 鼠标事件
  wrapper.addEventListener("mousedown", (e) => {
    isDragging = true;
    startX = e.clientX;
    currentX = getTranslateX();
    track.style.transition = "none";
  });

  window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    track.style.transform = `translateX(${clamp(currentX + dx)}px)`;
  });

  window.addEventListener("mouseup", () => {
    isDragging = false;
    track.style.transition = "transform 0.15s ease-out";
  });

  // 滚轮
  wrapper.addEventListener("wheel", (e) => {
    e.preventDefault();
    const delta = e.deltaX || e.deltaY;
    const current = getTranslateX();
    track.style.transition = "transform 0.15s ease-out";
    track.style.transform = `translateX(${clamp(current - delta * 0.8)}px)`;
  }, { passive: false });
}

/* ===== 原 JS 逻辑（完整保留） ===== */
const KEY = "56";
const login = document.getElementById("login");
const main = document.getElementById("main");
const past = document.getElementById("past");
const input = document.getElementById("key");
const modal = document.getElementById("modal");
const modalTime = document.getElementById("modal-time");
const modalContent = document.getElementById("modal-content");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && input.value !== KEY) {
    alert("密钥错误");
    input.value = "";
  }
});

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      playTypewriter();
    } else {
      main.style.display = "block";
      setTimeout(() => {
        buildTimeline();
        initTimelineInteraction();
      }, 50);
    }
  }
});

const photosByDate = {
  "2023-09-11": [
    "https://raw.githubusercontent.com/ac091/log/main/qu.jpg",
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ],
  "2023-06-15": [
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ]
};

let currentPhotos = [];
let currentIndex = 0;

function openModal(time, content) {
  modalTime.innerText = time;
  modalContent.innerHTML = content;

  if (photosByDate[time]) {
    const camera = document.createElement("div");
    camera.className = "camera";
    camera.innerHTML = "📷";
    camera.onclick = () => openAlbum(photosByDate[time]);
    modalContent.appendChild(camera);
  }

  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none";
  main.style.display = "block";
}

function openAlbum(photos) {
  currentPhotos = photos;
  currentIndex = 0;
  document.querySelector("#album img").src = currentPhotos[currentIndex];
  document.getElementById("album-page").innerText =
    (currentIndex + 1) + " / " + currentPhotos.length;
  document.getElementById("album").style.display = "block";
}

function prevImg() {
  if (currentIndex > 0) {
    currentIndex--;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function nextImg() {
  if (currentIndex < currentPhotos.length - 1) {
    currentIndex++;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function closeAlbum() {
  document.getElementById("album").style.display = "none";
}

/* ===== 打字机 & 生日 ===== */
const tw = document.getElementById("typewriter");
const typeSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-typewriter-key-1368.mp3");
typeSound.volume = 0.3;

function playTypewriter() {
  tw.style.display = "flex";

  typeText("这近三年来最美好的事是什么？", () => {
    setTimeout(() => eraseText(() => {
      typeText("想想就会发现根本想不完。", () => {
        setTimeout(() => {
          tw.style.display = "none";
          if (!localStorage.getItem("asked")) {
            document.getElementById("entry").style.display = "flex";
          } else {
            main.style.display = "block";
            setTimeout(() => {
              buildTimeline();
              initTimelineInteraction();
            }, 50);
          }
        }, 1800);
      });
    }), 1400);
  });
}

function typeText(text, cb) {
  let i = 0;
  tw.innerHTML = "";
  const timer = setInterval(() => {
    tw.innerHTML += text.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= text.length) {
      clearInterval(timer);
      cb();
    }
  }, 130);
}

function eraseText(cb) {
  const timer = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(timer);
      cb();
    }
  }, 70);
}

const cake = document.getElementById("cake");
const happy = document.getElementById("happy");
const message = document.getElementById("message");
const closeHint = document.getElementById("closeHint");

function startBirthday() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("birthday").style.display = "flex";

  setTimeout(() => cake.style.opacity = "1", 300);
  setTimeout(() => cake.style.opacity = "0", 3300);
  setTimeout(() => happy.style.opacity = "1", 4300);
  setTimeout(() => happy.style.opacity = "0", 7800);
  setTimeout(() => typeMessage("首先祝你生日快乐"), 9800);
}

function typeMessage(text) {
  let i = 0;
  message.style.opacity = "1";
  const timer = setInterval(() => {
    message.innerHTML += text.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= text.length) {
      clearInterval(timer);
      closeHint.style.display = "block";
    }
  }, 200);
}

function closeBirthday() {
  document.getElementById("birthday").style.display = "none";
  main.style.display = "block";
  localStorage.setItem("asked", "1");
  setTimeout(() => {
    buildTimeline();
    initTimelineInteraction();
  }, 50);
}
</script>
