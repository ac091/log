<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MEMORY SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #e5e7eb;
  overflow: hidden;
}

/* ===== 登录页（极深灰） ===== */
#login-screen {
  position: fixed;
  inset: 0;
  background-color: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.login-box {
  width: 420px;
  padding: 50px 40px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 14px;
  text-align: center;
}

.login-box p {
  font-size: 12px;
  letter-spacing: 3px;
  opacity: .4;
  margin-bottom: 30px;
}

.password-input {
  width: 100%;
  padding: 16px 20px;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 8px;
  outline: none;
}

/* ===== 主界面（深蓝灰） ===== */
#main-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #1a2332;
  z-index: 10;
  padding: 40px;
  overflow-y: auto;
}

.header {
  margin-bottom: 30px;
  font-size: 14px;
  opacity: .7;
}

/* 隐蔽按钮（更小更淡） */
.time-dot {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56, 189, 248, 0.6);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}

/* 列表 */
.memory-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.memory-item {
  padding: 18px 20px;
  background: rgba(255, 255, 255, 0.03);
  border-left: 3px solid rgba(56, 189, 248, 0.5);
  border-radius: 6px;
  cursor: pointer;
}

.memory-time {
  font-size: 16px;
  font-weight: 500;
  color: #c9d1d9;
}

/* ===== 过去界面（比主界面再深一度） ===== */
#past-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #141b27; /* 仅比主界面深一点 */
  z-index: 200;
  padding: 40px;
  overflow-y: auto;
}

.past-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  font-size: 14px;
  color: #888;
}

.back-btn {
  background: none;
  border: none;
  color: #888;
  cursor: pointer;
  font-size: 14px;
}

.back-btn:hover {
  color: #fff;
}

.past-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

.past-card {
  padding: 18px 20px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 6px;
  cursor: pointer;
}

.past-time {
  font-size: 16px;
  color: #888;
}

/* ===== 弹窗 ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  z-index: 500;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1a2332;
  border-radius: 10px;
  padding: 30px;
  width: 90%;
  max-width: 480px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 18px;
  margin-bottom: 15px;
  color: #c9d1d9;
}

.modal-text {
  font-size: 15px;
  line-height: 1.7;
  color: #888;
}
</style>
</head>

<body>

<!-- 登录 -->
<div id="login-screen">
  <div class="login-box">
    <p>SYSTEM SECURED</p >
    <input type="password" id="password-input" class="password-input" placeholder="KEY" maxlength="4">
  </div>
</div>

<!-- 主界面 -->
<div id="main-screen">
  <div class="header">现在</div>
  <div class="memory-list" id="memory-list"></div>
  <div class="time-dot" onclick="showPastScreen()"></div>
</div>

<!-- 过去界面 -->
<div id="past-screen">
  <div class="past-header">
    <span>过去</span>
    <button class="back-btn" onclick="hidePastScreen()">← 返回</button>
  </div>
  <div class="past-grid" id="past-grid"></div>
</div>

<!-- 弹窗 -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
  </div>
</div>

<script>
const PASSWORD = "56";

const loginScreen = document.getElementById('login-screen');
const mainScreen = document.getElementById('main-screen');
const passwordInput = document.getElementById('password-input');
const memoryList = document.getElementById('memory-list');
const pastGrid = document.getElementById('past-grid');

const memories = [
  { time: "2023-09-11", content: "武警院相遇" },
  { time: "2023-06-15", content: "那时候我们还不知道，后来会发生这么多事。" },
  { time: "2023-08-21", content: "夏天的晚风吹过，带来了远方的消息。" },
  { time: "2024-05-20", content: "天空很蓝，云走得很慢，时间仿佛停驻。" }
];

passwordInput.addEventListener('input', () => {
  if (passwordInput.value === PASSWORD) {
    loginScreen.style.display = 'none';
    mainScreen.style.display = 'block';
    renderMain();
    renderPast();
  } else if (passwordInput.value.length === 4) {
    alert("密钥错误");
    passwordInput.value = '';
  }
});

function renderMain() {
  memoryList.innerHTML = '';
  memories.forEach(m => {
    const div = document.createElement('div');
    div.className = 'memory-item';
    div.innerHTML = `<div class="memory-time">${m.time}</div>`;
    div.onclick = () => openModal(m.time, m.content);
    memoryList.appendChild(div);
  });
}

function renderPast() {
  pastGrid.innerHTML = '';
  memories.forEach(m => {
    const div = document.createElement('div');
    div.className = 'past-card';
    div.innerHTML = `<div class="past-time">${m.time}</div>`;
    div.onclick = () => openModal(m.time, m.content);
    pastGrid.appendChild(div);
  });
}

function openModal(title, text) {
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-text').innerText = text;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function showPastScreen() {
  mainScreen.style.display = 'none';
  pastScreen.style.display = 'block';
}

function hidePastScreen() {
  pastScreen.style.display = 'none';
  mainScreen.style.display = 'block';
}
</script>

</body>
</html>
