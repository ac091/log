<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 现在时间段：卡片堆叠 ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: #2a3649;
  z-index: 10;
  padding: 60px 80px;
  overflow-y: auto;
}

.main-header {
  font-size: 13px;
  opacity: .5;
  margin-bottom: 50px;
  letter-spacing: 2px;
}

.card-stack {
  display: flex;
  flex-direction: column;
  gap: 30px;
  align-items: center;
}

/* ✅ 新卡片样式 */
.log-card {
  width: 360px;
  padding: 40px 30px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(56,189,248,.3);
  border-radius: 16px;
  cursor: pointer;
  transition: all .35s ease;
  text-align: center;
}

.log-card:hover {
  transform: translateY(-8px);
  border-color: #38bdf8;
  box-shadow: 0 0 40px rgba(56,189,248,.4);
}

.card-date {
  font-size: 28px;
  font-weight: 700;
  color: #38bdf8;
  margin-bottom: 14px;
}

.card-hint {
  font-size: 14px;
  opacity: .5;
  letter-spacing: 2px;
}

/* ===== 过去时间段 ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
}

.timeline {
  position: relative;
  padding-left: 30px;
  border-left: 2px solid rgba(255,255,255,.08);
}

.node {
  position: relative;
  margin-bottom: 50px;
  cursor: pointer;
}

.node::before {
  content: "";
  position: absolute;
  left: -41px;
  top: 4px;
  width: 10px;
  height: 10px;
  background: #38bdf8;
  border-radius: 50%;
}

.node-time {
  font-size: 26px;
  color: #38bdf8;
  margin-bottom: 6px;
}

/* ===== 模态框 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px 36px;
  border-radius: 12px;
  width: 90%;
  max-width: 460px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.modal-content {
  font-size: 15px;
  line-height: 1.8;
  color: #cbd5e1;
}

.camera {
  margin-top: 18px;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 22px;
}

/* ===== 打字机 ===== */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 500;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* ✅ 6.4 入口（极大 + 极粗） */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 501;
  justify-content: center;
  align-items: center;
}

.entry-box {
  font-size: 96px;
  font-weight: 900;
  color: #38bdf8;
  letter-spacing: 12px;
  border: 4px solid #38bdf8;
  padding: 40px 80px;
  border-radius: 16px;
  cursor: pointer;
  transition: all .3s ease;
}

.entry-box:hover {
  background: rgba(56,189,248,.2);
  box-shadow: 0 0 60px rgba(56,189,248,.6);
}

/* ===== 生日页面 ===== */
#birthday {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 600;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#cake {
  font-size: 260px;
  opacity: 0;
  transition: opacity 1.8s ease;
}

#happy {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 64px;
  letter-spacing: 16px;
  color: #ffd1dc;
  opacity: 0;
  transition: opacity 2s ease;
}

#message {
  position: absolute;
  top: 26%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  color: #7dd3fc;
  opacity: 0;
  text-align: center;
  max-width: 80%;
  line-height: 1.8;
}

#closeHint {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<div id="typewriter"></div>
<div id="entry" onclick="startBirthday()">
  <div class="entry-box">6.4</div>
</div>

<div id="birthday">
  <div id="cake">🎂</div>
  <div id="happy">生日快乐</div>
  <div id="message"></div>
  <div id="closeHint" onclick="closeBirthday()">✕</div>
</div>

<!-- ✅ 现在时间段：卡片堆叠 -->
<div id="main">
  <div class="main-header">RECENT LOGS</div>
  <div class="card-stack">
    <div class="log-card" onclick="openModal('2026-05-25','今天这个小网站正式可以运行了，好有成就感。这是我做的第一个网站，也是第一次正儿八经跑代码，惊喜吧应该，其实这个想法不算突然，只是没法确定代码可以跑起来，可我前两天还是决定先悄悄藏在戒指上，你应该暂时发现不了，上次的八千字讲了很多人很多事，但我想说那并不是全部，这个网站会保持更新的，也会有很多可以探索的地方，这个网站，只关于你，也只属于我们。')">
      <div class="card-date">2026-05-25</div>
      <div class="card-hint">CLICK TO OPEN</div>
    </div>
    <div class="log-card" onclick="openModal('2026-06-01','系统开始记录新的轨迹。')">
      <div class="card-date">2026-06-01</div>
      <div class="card-hint">CLICK TO OPEN</div>
    </div>
    <div class="log-card" onclick="openModal('2024-06-04','首先祝你生日快乐')">
      <div class="card-date">2024-06-04</div>
      <div class="card-hint">CLICK TO OPEN</div>
    </div>
  </div>
</div>

<div id="past">
  <div class="past-header" onclick="closePast()">◀ BACK</div>
  <div class="timeline">
    <div class="node" onclick="openModal('2023-09-11','在武警院我们相遇。不管过去多久我还是想说，很高兴认识你。')">
      <div class="node-time">2023-09-11</div>
    </div>
    <div class="node" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="node-time">2023-06-15</div>
    </div>
  </div>
</div>

<div class="gate" onclick="openPast()"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
const KEY = "56";
const login = document.getElementById("login");
const main = document.getElementById("main");
const past = document.getElementById("past");
const input = document.getElementById("key");

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      playTypewriter();
    } else {
      main.style.display = "block";
    }
  }
});

function openModal(time, content) {
  document.getElementById("modal-time").innerText = time;
  document.getElementById("modal-content").innerHTML = content;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none;
  main.style.display = "block";
}

/* 打字机 */
const tw = document.getElementById("typewriter");
const entry = document.getElementById("entry");

function playTypewriter() {
  tw.style.display = "flex";
  typeText("这近三年来最美好的事是什么？", () => {
    setTimeout(() => eraseText(() => {
      typeText("想想就会发现根本想不完。", () => {
        setTimeout(() => {
          tw.style.display = "none";
          entry.style.display = "flex";
        }, 1800);
      });
    }), 1400);
  });
}

function typeText(text, cb) {
  let i = 0;
  tw.innerHTML = "";
  const timer = setInterval(() => {
    tw.innerHTML += text.charAt(i++);
    if (i >= text.length) {
      clearInterval(timer);
      cb();
    }
  }, 130);
}

function eraseText(cb) {
  const timer = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(timer);
      cb();
    }
  }, 70);
}

/* 生日 */
const cake = document.getElementById("cake");
const happy = document.getElementById("happy");
const message = document.getElementById("message");
const closeHint = document.getElementById("closeHint");

function startBirthday() {
  entry.style.display = "none";
  birthday.style.display = "flex";

  setTimeout(() => cake.style.opacity = "1", 300);
  setTimeout(() => cake.style.opacity = "0", 3300);
  setTimeout(() => happy.style.opacity = "1", 4300);
  setTimeout(() => happy.style.opacity = "0", 7800);
  setTimeout(() => typeMessage("首先祝你生日快乐"), 9800);
}

function typeMessage(text) {
  let i = 0;
  message.style.opacity = "1";
  const timer = setInterval(() => {
    message.innerHTML += text.charAt(i++);
    if (i >= text.length) {
      clearInterval(timer);
      closeHint.style.display = "block";
    }
  }, 200);
}

function closeBirthday() {
  birthday.style.display = "none";
  main.style.display = "block";
  localStorage.setItem("asked", "1");
}
</script>

</body>
</html>
