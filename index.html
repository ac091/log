<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
}

/* 登录 */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ✅ 现在时间段（你点名要改的） */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: #1a2332; /* 去纯白 */
  z-index: 10;
  padding: 60px 80px;
  overflow-y: auto;
}

.main-header {
  font-size: 13px;
  opacity: .5;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ✅ 日期形式（你点名要换的） */
.item {
  padding: 18px 22px;
  background: rgba(255,255,255,.06);
  border-left: 3px solid rgba(56,189,248,.6);
  border-radius: 6px;
  cursor: pointer;
  transition: all .25s ease;
}

.item:hover {
  background: rgba(255,255,255,.09);
  transform: translateX(4px);
}

/* 打字机 */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 300;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* 6.4 */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 301;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  color: #7dd3fc;
  cursor: pointer;
}

#entry:hover {
  color: #38bdf8;
}

/* 过去 */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
}

.timeline {
  position: relative;
  padding-left: 30px;
  border-left: 2px solid rgba(255,255,255,.08);
}

.node {
  position: relative;
  margin-bottom: 50px;
  cursor: pointer;
}

.node::before {
  content: "";
  position: absolute;
  left: -41px;
  top: 4px;
  width: 10px;
  height: 10px;
  background: #38bdf8;
  border-radius: 50%;
}

.node-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 6px;
}

/* 相册 */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
}

#album-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

.gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<!-- ✅ 打字机 -->
<div id="typewriter"></div>

<!-- ✅ 6.4 -->
<div id="entry" onclick="enterMain()">6.4</div>

<!-- ✅ 现在时间段（你原来的内容） -->
<div id="main">
  <div class="main-header">RECENT LOGS</div>
  <div class="list">
    <div class="item" onclick="openModal('2026-05-25','今天这个小网站正式可以运行了，好有成就感。这是我做的第一个网站，也是第一次正儿八经跑代码，惊喜吧应该，其实这个想法不算突然，只是没法确定代码可以跑起来，可我前两天还是决定先悄悄藏在戒指上，你应该暂时发现不了，上次的八千字讲了很多人很多事，但我想说那并不是全部，这个网站会保持更新的，也会有很多可以探索的地方，这个网站，只关于你，也只属于我们。')">
      2026-05-25
    </div>
    <div class="item" onclick="openModal('2026-06-01','系统开始记录新的轨迹。')">
      2026-06-01
    </div>
  </div>
</div>

<!-- ✅ 过去时间段（你原来的） -->
<div id="past">
  <div class="past-header" onclick="closePast()">◀ BACK</div>
  <div class="timeline">
    <div class="node" onclick="openModal('2023-09-11','在武警院我们相遇。不管过去多久我还是想说，很高兴认识你。')">
      <div class="node-time">2023-09-11</div>
    </div>
    <div class="node" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="node-time">2023-06-15</div>
    </div>
  </div>
</div>

<!-- 相册 -->
<div id="album">
  <div id="album-page"></div>
  <div class="album-btn" style="left:20px;" onclick="prevImg()">‹</div>
  <div style="display:flex;justify-content:center;align-items:center;height:100%;">
    <img src="">
  </div>
  <div class="album-btn" style="right:20px;" onclick="nextImg()">›</div>
  <div id="album-close" onclick="closeAlbum()">✕</div>
</div>

<div class="gate" onclick="openPast()"></div>

<script>
const KEY = "56";
const login = document.getElementById("login");
const keyInput = document.getElementById("key");
const tw = document.getElementById("typewriter");
const entry = document.getElementById("entry");
const main = document.getElementById("main");

keyInput.addEventListener("input", () => {
  if (keyInput.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      playTypewriter();
    } else {
      main.style.display = "block";
    }
  }
});

/* ✅ 打字机（速度按你说的调慢） */
function playTypewriter() {
  tw.style.display = "flex";

  typeText("这近三年来最美好的事是什么？", () => {
    setTimeout(() => eraseText(() => {
      typeText("想想就会发现根本想不完。", () => {
        setTimeout(() => {
          tw.style.display = "none";
          entry.style.display = "flex";
        }, 1600);
      });
    }), 1200);
  });
}

function typeText(text, cb) {
  let i = 0;
  tw.innerHTML = "";
  const timer = setInterval(() => {
    tw.innerHTML += text.charAt(i++);
    if (i >= text.length) {
      clearInterval(timer);
      cb();
    }
  }, 95); // ✅ 慢
}

function eraseText(cb) {
  const timer = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(timer);
      cb();
    }
  }, 55); // ✅ 慢
}

function enterMain() {
  entry.style.display = "none";
  main.style.display = "block";
  localStorage.setItem("asked", "1");
}

/* ✅ 你原来的逻辑，我一个字没动 */
function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none";
  main.style.display = "block";
}

const photosByDate = {
  "2023-09-11": [
    "https://raw.githubusercontent.com/ac091/log/main/qu.jpg",
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ],
  "2023-06-15": [
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ]
};

let currentPhotos = [];
let currentIndex = 0;

function openModal(time, content) {
  document.getElementById("modal-time").innerText = time;
  document.getElementById("modal-content").innerHTML = content;

  if (photosByDate[time]) {
    const camera = document.createElement("div");
    camera.className = "camera";
    camera.innerHTML = "📷";
    camera.onclick = () => openAlbum(photosByDate[time]);
    document.getElementById("modal-content").appendChild(camera);
  }

  document.getElementById("modal").style.display = "flex";
}

function openAlbum(photos) {
  currentPhotos = photos;
  currentIndex = 0;
  document.querySelector("#album img").src = currentPhotos[currentIndex];
  document.getElementById("album-page").innerText =
    (currentIndex + 1) + " / " + currentPhotos.length;
  document.getElementById("album").style.display = "block";
}

function prevImg() {
  if (currentIndex > 0) {
    currentIndex--;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function nextImg() {
  if (currentIndex < currentPhotos.length - 1) {
    currentIndex++;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function closeAlbum() {
  document.getElementById("album").style.display = "none";
}
</script>

</body>
</html>
