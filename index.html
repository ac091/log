<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
  cursor: default;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 导航页 ===== */
#nav {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 70%);
  z-index: 50;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}

#nav::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(56,189,248,.8), transparent),
    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 20% 70%, rgba(56,189,248,.6), transparent),
    radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 40% 85%, rgba(56,189,248,.5), transparent),
    radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,.5), transparent);
  pointer-events: none;
  z-index: 0;
}

.nav-title {
  font-size: 12px;
  letter-spacing: 10px;
  color: rgba(255,255,255,.2);
  margin-bottom: 80px;
  z-index: 1;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 40px;
  z-index: 1;
}

.nav-link {
  font-size: 48px;
  font-weight: 600;
  color: #9ca3af;
  letter-spacing: 4px;
  cursor: pointer;
  position: relative;
  transition: color .4s ease;
}

.nav-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -10px;
  width: 0;
  height: 2px;
  background: #38bdf8;
  transition: width .4s ease;
}

.nav-link:hover {
  color: #38bdf8;
}

.nav-link:hover::after {
  width: 100%;
}

/* ===== 现在时间段 ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #243458, #18223F, #0F1A30);
  background-image:
    linear-gradient(160deg, #243458 0%, #18223F 50%, #0F1A30 100%),
    radial-gradient(circle at 25% 15%, rgba(56,189,248,0.15), transparent 45%),
    radial-gradient(circle at 75% 80%, rgba(124,211,252,0.12), transparent 50%);
  background-blend-mode: screen;
  z-index: 10;
  padding: 60px 80px;
  overflow: hidden;
}

.main-header {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 20px;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.main-header .back-btn {
  cursor: pointer;
  color: #a0aec0;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all .3s ease;
}

.main-header .back-btn:hover {
  color: #38bdf8;
  background: rgba(56,189,248,.15);
}

.timeline-now {
  position: relative;
  width: 100%;
  height: calc(100vh - 120px);
  overflow-y: auto;
  scroll-behavior: smooth;
}

.timeline-now::-webkit-scrollbar {
  width: 6px;
}

.timeline-now::-webkit-scrollbar-thumb {
  background: rgba(56,189,248,.4);
  border-radius: 3px;
}

.timeline-now::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom,
    rgba(56,189,248,.8),
    rgba(56,189,248,.2)
  );
  pointer-events: none;
}

.timeline-item {
  position: relative;
  width: 100%;
  padding: 30px 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #38bdf8;
  box-shadow: 0 0 20px rgba(56,189,248,1), 0 0 40px rgba(56,189,248,.5);
  cursor: pointer;
  transition: transform .3s ease;
  z-index: 2;
  flex-shrink: 0;
}

.dot:hover {
  transform: scale(1.5);
}

.label {
  position: absolute;
  font-size: 20px;
  font-weight: 700;
  color: #7dd3fc;
  opacity: .8;
  cursor: pointer;
  z-index: 2;
  text-shadow: 0 0 8px rgba(124,211,252,0.3);
}

.label:hover {
  opacity: 1;
}

.timeline-item:nth-child(odd) .dot {
  order: 2;
}

.timeline-item:nth-child(odd) .label {
  order: 1;
  right: calc(50% + 30px);
}

.timeline-item:nth-child(even) .dot {
  order: 1;
}

.timeline-item:nth-child(even) .label {
  order: 2;
  left: calc(50% + 30px);
}

/* ===== 过去时间段 / 时空驿站 ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(145deg, #101828, #0a0f1c);
  background-image:
    linear-gradient(145deg, #101828 0%, #0a0f1c 100%),
    radial-gradient(circle at 15% 20%, rgba(30, 60, 110, 0.18), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(20, 45, 90, 0.15), transparent 55%);
  background-blend-mode: screen;
  z-index: 200;
  overflow: hidden;
}

#past .past-header {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 14px;
  color: #a0aec0;
  cursor: pointer;
  z-index: 10;
}

#yearToggle {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-240px, -68%);
  font-size: 28px;
  color: rgba(255,255,255,.6);
  cursor: pointer;
  z-index: 15;
}

#indexList {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-240px, 30px);
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 15;
  background: rgba(18, 26, 51, 0.92);
  padding: 12px 16px;
  border-radius: 6px;
  border: 1px solid rgba(56,189,248,.2);
}

#indexList div {
  font-size: 13px;
  color: #38bdf8;
  cursor: pointer;
  white-space: nowrap;
}

#indexList div:hover {
  color: #7dd3fc;
}

.picker-center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}

.date-display {
  font-size: 64px;
  font-weight: 800;
  color: #38bdf8;
  letter-spacing: 4px;
  user-select: none;
  text-shadow: 0 0 15px rgba(56,189,248,.6);
}

.confirm-btn {
  margin-top: 60px;
  font-family: monospace;
  font-size: 16px;
  letter-spacing: 8px;
  color: #38bdf8;
  border: 1px solid rgba(56,189,248,.5);
  padding: 14px 70px;
  cursor: pointer;
  transition: all .3s ease;
  border-radius: 4px;
}

.confirm-btn:hover {
  background: rgba(56,189,248,.15);
  box-shadow: 0 0 12px rgba(56,189,248,.3);
}

/* ===== 关键字页面 ===== */
#keywordPage {
  display: none;
  position: fixed;
  inset: 0;
  background: #0b0f1a;
  z-index: 250;
  justify-content: center;
  align-items: center;
}

.keyword-back {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 16px;
  color: #47569;
  cursor: pointer;
  letter-spacing: 2px;
}

.keyword-box {
  font-size: 56px;
  font-weight: 800;
  color: #ffffff;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 2px;
}

.keyword-box:hover {
  color: #38bdf8;
  transform: scale(1.08);
}

/* ===== 内容模态框 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.96);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  width: 80vw;
  max-width: 900px;
  max-height: 85vh;
  padding: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.modal-content {
  font-size: 22px;
  line-height: 1.9;
  color: #d1d5db;
  text-align: center;
  overflow-y: auto;
  width: 100%;
  padding-top: 20px;
}

.modal-back {
  position: absolute;
  top: 30px;
  left: 30px;
  font-size: 16px;
  color: #47569;
  cursor: pointer;
  letter-spacing: 2px;
}

.modal-back:hover {
  color: #38bdf8;
}

.camera {
  margin-top: 40px;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 26px;
}

/* ===== 其余页面 ===== */
#csPage {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #0f0f0f, #1a1a2e);
  z-index: 10;
  justify-content: flex-start;
  align-items: center;
  flex-direction: column;
  padding-top: 80px;
}

#csPage .back-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  cursor: pointer;
  color: #47569;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all .3s ease;
}

#csPage .back-btn:hover {
  color: #38bdf8;
  background: rgba(56,189,248,.1);
}

.cs-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 60px;
  margin-bottom: 60px;
}

.cs-left, .cs-right {
  font-size: 72px;
  font-weight: 900;
  color: #9ca3af;
  letter-spacing: 8px;
}

.cs-divider {
  width: 1px;
  height: 60px;
  background: rgba(255,255,255,.15);
}

.cs-content {
  display: flex;
  gap: 120px;
}

.cs-column {
  width: 260px;
  color: #555;
  font-size: 14px;
  text-align: center;
}

.page-placeholder {
  display: none;
  position: fixed;
  inset: 0;
  background: #0b0f1a;
  z-index: 10;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  color: #47569;
}

.page-placeholder .back-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  cursor: pointer;
  font-size: 16px;
  letter-spacing: 2px;
  color: #47569;
}

/* ===== 相册 ===== */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
}

#album-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

/* ===== 右下角小点 ===== */
#main .gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.7);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
  box-shadow: 0 0 10px rgba(56,189,248,.6);
}

/* ===== 打字机 ===== */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 500;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* ===== 6.4 ===== */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 501;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#entry .entry-box {
  font-size: 100px;
  font-weight: 950;
  color: #38bdf8;
  text-shadow:
    0 0 20px rgba(56,189,248,.8),
    0 0 60px rgba(56,189,248,.5),
    0 0 120px rgba(56,189,248,.3);
  animation: pulse 2.5s infinite;
  transition: transform .3s ease;
}

#entry:hover .entry-box {
  transform: scale(1.08);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

/* ===== 生日页面 + 烟花画布 ===== */
#birthday {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 600;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}

/* 烟花画布 */
#fireworksCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

#cake {
  font-size: 260px;
  opacity: 0;
  transition: opacity 1.8s ease;
  position: relative;
  z-index: 2;
}

#happy {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 64px;
  letter-spacing: 16px;
  color: #ffd1dc;
  opacity: 0;
  transition: opacity 2s ease;
  text-align: center;
  z-index: 2;
}

#message {
  position: absolute;
  top: 26%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  color: #7dd3fc;
  opacity: 0;
  text-align: center;
  max-width: 80%;
  line-height: 1.8;
  z-index: 2;
}

#closeHint {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  display: none;
  z-index: 2;
}

/* ===== 时空驿站 ===== */
#pastModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 1000;
}

#pastModal .box {
  position: fixed;
  right: 60px;
  bottom: 60px;
  text-align: left;
  background: rgba(15,23,42,0.85);
  padding: 20px;
  border-radius: 8px;
  border: 1px solid rgba(56,189,248,.2);
}

#pastModal .title {
  font-size: 18px;
  color: rgba(255,255,255,.5);
  letter-spacing: 6px;
  margin-bottom: 18px;
}

#pastModal .options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#pastModal .opt {
  font-size: 14px;
  color: rgba(255,255,255,.35);
  letter-spacing: 4px;
  cursor: pointer;
  transition: color .3s;
}

#pastModal .opt:hover {
  color: #38bdf8;
}

#pastHint {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1001;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity .8s ease;
}

#pastHint.show {
  display: flex;
  opacity: 1;
}

#pastHint .text {
  font-size: 18px;
  color: rgba(255,255,255,.35);
  letter-spacing: 8px;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<div id="typewriter"></div>

<div id="entry" onclick="startBirthday()">
  <div class="entry-box">6.4</div>
</div>

<div id="nav">
  <div class="nav-title">SELECT</div>
  <div class="nav-links">
    <div class="nav-link" onclick="goToMain()">故事</div>
    <div class="nav-link" onclick="goToIdea()">IDEA</div>
    <div class="nav-link" onclick="goToCS()">SONG</div>
    <div class="nav-link" onclick="goToOther()">其 他</div>
  </div>
</div>

<div id="main">
  <div class="main-header">
    <span class="back-btn" onclick="goToNav()">◀ BACK</span>
    <span>TIME CAPSULE</span>
  </div>
  <div class="timeline-now" id="timelineNow"></div>
  <div class="gate" onclick="openPastModal()"></div>
</div>

<!-- ===== 过去时间段 ===== -->
<div id="past">
  <div class="past-header" onclick="goToMain()">◀ BACK</div>

  <div id="yearToggle" onclick="toggleIndex()">▾</div>
  <div id="indexList"></div>

  <div class="picker-center" id="picker" onwheel="scrollDate(event)">
    <div>
      <div class="date-display" id="dateDisplay"></div>
      <div class="confirm-btn" onclick="confirmPast()">CONFIRM</div>
    </div>
  </div>
</div>

<!-- ===== 关键字页面 ===== -->
<div id="keywordPage">
  <div class="keyword-back" onclick="backToPast()">◀ BACK</div>
  <div class="keyword-box" id="keywordBox" onclick="openContent()"></div>
</div>

<div id="csPage">
  <div class="back-btn" onclick="goToNav()">◀ BACK</div>
  <div class="cs-header">
    <div class="cs-left">C</div>
    <div class="cs-divider"></div>
    <div class="cs-right">S</div>
  </div>
  <div class="cs-content">
    <div class="cs-column">[ 冠军 ]</div>
    <div class="cs-column">[ S 歌单 ]</div>
  </div>
</div>

<div id="idea" class="page-placeholder">
  <div class="back-btn" onclick="goToNav()">◀ BACK</div>
  <div class="content">IDEA</div>
</div>

<div id="other" class="page-placeholder">
  <div class="back-btn" onclick="goToNav()">◀ BACK</div>
  <div class="content">其 他</div>
</div>

<div id="album">
  <div id="album-page"></div>
  <div class="album-btn" style="left:20px;" onclick="prevImg()">‹</div>
  <div style="display:flex;justify-content:center;align-items:center;height:100%;"><img src=""></div>
  <div class="album-btn" style="right:20px;" onclick="nextImg()">›</div>
  <div id="album-close" onclick="closeAlbum()">✕</div>
</div>

<!-- ✅ 内容页 -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-back" onclick="closeModal()">◀ BACK</div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<div id="pastModal" onclick="closePastModal()">
  <div class="box" onclick="event.stopPropagation()">
    <div class="title">时空驿站</div>
    <div class="options">
      <div class="opt" onclick="confirmEnterPast()">进入</div>
      <div class="opt" onclick="closePastModal()">取消</div>
    </div>
  </div>
</div>

<div id="pastHint">
  <div class="text">ENTERING TIME STATION</div>
</div>

<!-- 生日页面 + 烟花 -->
<div id="birthday">
  <canvas id="fireworksCanvas"></canvas>
  <div id="cake">🎂</div>
  <div id="happy">生日快乐</div>
  <div id="message"></div>
  <div id="closeHint" onclick="closeBirthday()">✕</div>
</div>

<script>
/* ========= 数据 ========= */
const timelineData = [
  { date: "2026-06-04", content: "首先祝你生日快乐。" },
  { date: "2026-05-25", content: "今天这个小网站正式可以运行了，好有成就感。" }
];

const pastData = {
  "2023-06-15": { keyword: "未知", content: "那时候我们还不知道，后来会发生这么多事。" },
  "2023-09-11": { keyword: "初见", content: "在武警院我们相遇。很高兴认识你。" },
  "2024-01-03": { keyword: "测试", content: "这是一个测试条目。<br><br>这里可以放很长很长的文字。<br>用来验证 Close 是否始终在底部。" }
};

const pastDates = Object.keys(pastData).sort();
let currentIndex = 0;
let isScrolling = false;
let modalSource = null;

/* ========= 页面切换 ========= */
function hideAll() {
  ["main","past","nav","csPage","idea","other","keywordPage","modal"].forEach(id=>{
    document.getElementById(id).style.display = "none";
  });
}

function goToNav() {
  hideAll();
  document.getElementById("nav").style.display = "flex";
}

function goToMain() {
  hideAll();
  document.getElementById("main").style.display = "block";
}

function goToPast() {
  hideAll();
  document.getElementById("past").style.display = "block";

function typeText(t, cb) {
  let i = 0;
  tw.innerHTML = "";
  const r = setInterval(() => {
    tw.innerHTML += t.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();

      clearInterval(r);
      cb();
    }
  }, 130);
}

  const r = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(r);
      cb();
    }
  }, 70);
}

/* ====================== 生日 + 立体慢烟花（最终优化版） ====================== */
const cake = document.getElementById("cake");
const happy = document.getElementById("happy");
const message = document.getElementById("message");
const closeHint = document.getElementById("closeHint");

const canvas = document.getElementById("fireworksCanvas");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 1.8 + 0.8;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.gravity = 0.012;
    this.alpha = 1;
    this.color = color;
    this.trail = [];
  }
  update() {
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= 0.008;
    this.trail.push({ x: this.x, y: this.y, a: this.alpha });
    if (this.trail.length > 10) this.trail.shift();
  }
  draw() {
    this.trail.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = this.color.replace("1)", (p.a * 0.4) + ")");
      ctx.fill();
    });
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace("1)", this.alpha + ")");
    ctx.fill();
  }
}

function createFirework() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height * 0.55;
  const colors = [
    "rgba(255,100,150,1)",
    "rgba(100,200,255,1)",
    "rgba(255,220,100,1)",
    "rgba(150,255,150,1)"
  ];
  const color = colors[Math.floor(Math.random() * colors.length)];
  for (let i = 0; i < 90; i++) {
    particles.push(new Particle(x, y, color));
  }
}

function animateFireworks() {
  ctx.fillStyle = "rgba(0,0,0,0.07)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.alpha <= 0) particles.splice(i, 1);
  }
  requestAnimationFrame(animateFireworks);
}
animateFireworks();

function startBirthday() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("birthday").style.display = "flex";

  setTimeout(() => {
    cake.style.opacity = "1";
    let fire = setInterval(createFirework, 700);
    setTimeout(() => clearInterval(fire), 4500);
  }, 300);

  setTimeout(() => cake.style.opacity = "0", 3300);
  setTimeout(() => happy.style.opacity = "1", 4300);
  setTimeout(() => happy.style.opacity = "0", 7800);
  setTimeout(() => typeMessage("首先祝你生日快乐"), 9800);
}

function typeMessage(t) {
  let i = 0;
  message.style.opacity = "1";
  const r = setInterval(() => {
    message.innerHTML += t.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= t.length) {
      clearInterval(r);
      closeHint.style.display = "block";
    }
  }, 200);
}

  localStorage.setItem("asked", "1");

/* ========= 过去：滚轮 & 列表 ========= */
function scrollDate(e) {
  e.preventDefault();
  if (isScrolling) return;
  isScrolling = true;
  setTimeout(() => isScrolling = false, 150);

  if (e.deltaY > 0) {
    currentIndex = Math.min(currentIndex + 1, pastDates.length - 1);
  } else {
    currentIndex = Math.max(currentIndex - 1, 0);
  }
  updateDateDisplay();
}

function updateDateDisplay() {
  document.getElementById("dateDisplay").innerText = pastDates[currentIndex];
}

function confirmPast() {
  const key = pastDates[currentIndex];
  document.getElementById("keywordBox").innerText = pastData[key].keyword;
  hideAll();
  document.getElementById("keywordPage").style.display = "flex";
}

function openContent() {
  const key = pastDates[currentIndex];
  openModal(key, pastData[key].content);
}

/* 倒三角 & 空白关闭 */
function toggleIndex() {
  const list = document.getElementById("indexList");
  list.style.display = list.style.display === "none" ? "flex" : "none";
}

function buildIndex() {
  const list = document.getElementById("indexList");
  list.innerHTML = "";
  pastDates.forEach((k, i) => {
    const d = document.createElement("div");
    d.innerText = k;
    d.onclick = () => {
      currentIndex = i;
      updateDateDisplay();
      toggleIndex();
    };
    list.appendChild(d);
  });
}

document.getElementById("past").addEventListener("click", function (e) {
  const list = document.getElementById("indexList");
  const toggle = document.getElementById("yearToggle");
  if (
    list.style.display === "flex" &&
    !list.contains(e.target) &&
    e.target !== toggle
  ) {
    list.style.display = "none";
  }
});

renderTimeline();
</script>
