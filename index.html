<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MEMORY SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #e5e7eb;
  overflow: hidden;
}

/* ===== 登录页（更深） ===== */
#login-screen {
  position: fixed;
  inset: 0;
  background-color: #111111;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

/* 登录框（加宽、简约） */
.login-box {
  width: 420px;
  padding: 50px 40px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  text-align: center;
}

.login-box p {
  font-size: 13px;
  letter-spacing: 3px;
  opacity: .5;
  margin-bottom: 30px;
}

/* 密码输入 */
.password-input {
  width: 100%;
  padding: 16px 20px;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 8px;
  outline: none;
}

/* ===== 主界面 ===== */
#main-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #1e293b;
  z-index: 10;
  padding: 40px;
  overflow-y: auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

/* 隐蔽按钮 */
.time-dot {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 12px;
  height: 12px;
  background: #38bdf8;
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}

/* 列表 */
.memory-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.memory-item {
  padding: 20px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 8px;
  cursor: pointer;
}

.memory-time {
  font-size: 18px;
  font-weight: bold;
  color: #38bdf8;
}

/* ===== 过去界面 ===== */
#past-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #2c1b47;
  z-index: 200;
  padding: 60px 40px;
  overflow-y: auto;
}

.past-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  color: #e9d5ff;
}

.past-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
}

.past-card {
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
}

/* ===== 弹窗 ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 500;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  border-radius: 10px;
  padding: 30px;
  width: 80%;
  max-width: 500px;
}

.modal-title {
  font-size: 20px;
  margin-bottom: 15px;
  color: #38bdf8;
}

.modal-text {
  font-size: 16px;
  line-height: 1.6;
  color: #cbd5e1;
}
</style>
</head>

<body>

<!-- 登录 -->
<div id="login-screen">
  <div class="login-box">
    <p>SYSTEM SECURED</p >
    <input
      type="password"
      id="password-input"
      class="password-input"
      placeholder="KEY"
      maxlength="4"
    >
  </div>
</div>

<!-- 主界面 -->
<div id="main-screen">
  <div class="header">
    <h1>记忆存档</h1>
  </div>
  <div class="memory-list" id="memory-list"></div>
  <div class="time-dot" onclick="showPastScreen()"></div>
</div>

<!-- 过去界面 -->
<div id="past-screen">
  <div class="past-header">
    <h2>◎ 时光回溯</h2>
    <button onclick="hidePastScreen()" style="background:none;border:none;color:#e9d5ff;cursor:pointer;">← 返回</button>
  </div>
  <div class="past-grid" id="past-grid"></div>
</div>

<!-- 弹窗 -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
  </div>
</div>

<script>
const PASSWORD = "56";

const loginScreen = document.getElementById('login-screen');
const mainScreen = document.getElementById('main-screen');
const passwordInput = document.getElementById('password-input');
const memoryList = document.getElementById('memory-list');
const pastGrid = document.getElementById('past-grid');

const memories = [
  { time: "2023-06-15", content: "那时候我们还不知道，后来会发生这么多事。" },
  { time: "2023-08-21", content: "夏天的晚风吹过，带来了远方的消息。" },
  { time: "2023-10-05", content: "雨后的街道，倒映着城市的霓虹。" },
  { time: "2024-05-20", content: "天空很蓝，云走得很慢，时间仿佛停驻。" }
];

passwordInput.addEventListener('input', () => {
  if (passwordInput.value === PASSWORD) {
    loginScreen.style.display = 'none';
    mainScreen.style.display = 'block';
    renderMain();
    renderPast();
  } else if (passwordInput.value.length === 4) {
    alert("密码错误");
    passwordInput.value = '';
  }
});

function renderMain() {
  memoryList.innerHTML = '';
  memories.forEach(m => {
    const div = document.createElement('div');
    div.className = 'memory-item';
    div.innerHTML = `<div class="memory-time">${m.time}</div>`;
    div.onclick = () => openModal(m.time, m.content);
    memoryList.appendChild(div);
  });
}

function renderPast() {
  pastGrid.innerHTML = '';
  memories.forEach(m => {
    const div = document.createElement('div');
    div.className = 'past-card';
    div.innerHTML = `<div class="past-time">${m.time}</div>`;
    div.onclick = () => openModal(m.time, m.content);
    pastGrid.appendChild(div);
  });
}

function openModal(title, text) {
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-text').innerText = text;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function showPastScreen() {
  mainScreen.style.display = 'none';
  pastScreen.style.display = 'block';
}

function hidePastScreen() {
  pastScreen.style.display = 'none';
  mainScreen.style.display = 'block';
}
</script>

</body>
</html>
