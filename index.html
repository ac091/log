<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at 30% 20%, #1b263b, #0d1525);
  color: #e5e7eb;
  overflow: hidden;
}

/* 登录 */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 400px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 6px;
  opacity: .35;
  margin-bottom: 40px;
}

input.key {
  width: 100%;
  padding: 18px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  color: #fff;
  font-size: 22px;
  text-align: center;
  letter-spacing: 14px;
  outline: none;
}

/* 打字机 */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 200;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* 选项 */
#choice {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 201;
  justify-content: center;
  align-items: center;
}

.choice-btn {
  font-size: 26px;
  padding: 18px 40px;
  border: 1px solid rgba(56,189,248,.6);
  border-radius: 12px;
  color: #7dd3fc;
  cursor: pointer;
  transition: all .3s ease;
}

.choice-btn:hover {
  background: rgba(56,189,248,.15);
  transform: scale(1.05);
}

/* 主页面 */
#main {
  display: none;
  position: fixed;
  inset: 0;
  padding: 70px 100px;
  overflow-y: auto;
}

.main-header {
  font-size: 14px;
  letter-spacing: 3px;
  opacity: .5;
  margin-bottom: 50px;
}

.list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* ✅ 日期 hover 反馈 */
.item {
  padding: 24px;
  background: rgba(255,255,255,.05);
  border-radius: 14px;
  cursor: pointer;
  transition: all .3s ease;
  border: 1px solid transparent;
}

.item:hover {
  background: rgba(255,255,255,.1);
  border-color: rgba(56,189,248,.6);
  transform: translateY(-4px);
  box-shadow: 0 0 18px rgba(56,189,248,.25);
}

.date {
  font-size: 20px;
  font-weight: 600;
  color: #7dd3fc;
}

/* 过往 */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  padding: 70px 100px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 60px;
  cursor: pointer;
}

.timeline {
  position: relative;
  padding-left: 30px;
  border-left: 2px solid rgba(255,255,255,.08);
}

.node {
  position: relative;
  margin-bottom: 60px;
  cursor: pointer;
}

.node::before {
  content: "";
  position: absolute;
  left: -41px;
  top: 6px;
  width: 12px;
  height: 12px;
  background: #38bdf8;
  border-radius: 50%;
  box-shadow: 0 0 10px #38bdf8;
}

.node-time {
  font-size: 18px;
  font-weight: 500;
  color: #38bdf8;
}

.gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 12px;
  height: 12px;
  background: #38bdf8;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 12px #38bdf8;
  z-index: 20;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<!-- 打字机 -->
<div id="typewriter"></div>

<!-- 单选项 -->
<div id="choice">
  <div class="choice-btn" onclick="enterMain()">6.4</div>
</div>

<!-- 主页面 -->
<div id="main">
  <div class="main-header">RECENT LOGS</div>
  <div class="list">
    <div class="item" onclick="alert('打开日志')">
      <div class="date">2026.05.25</div>
    </div>
    <div class="item" onclick="alert('打开日志')">
      <div class="date">2026.06.01</div>
    </div>
  </div>
</div>

<div class="gate" onclick="openPast()"></div>

<script>
const KEY = "56";
const login = document.getElementById("login");
const keyInput = document.getElementById("key");
const tw = document.getElementById("typewriter");
const choice = document.getElementById("choice");

keyInput.addEventListener("input", () => {
  if (keyInput.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      playTypewriter();
    } else {
      main.style.display = "block";
    }
  }
});

/* 打字机 */
function playTypewriter() {
  tw.style.display = "flex";
  typeText("这近三年来最美好的事是什么？", () => {
    setTimeout(() => eraseText(() => {
      typeText("想想就会发现根本想不完。", () => {
        setTimeout(() => {
          tw.style.display = "none";
          choice.style.display = "flex";
          localStorage.setItem("asked", "1");
        }, 1600);
      });
    }), 1200);
  });
}

function typeText(text, cb) {
  let i = 0;
  tw.innerHTML = "";
  const timer = setInterval(() => {
    tw.innerHTML += text.charAt(i++);
    if (i >= text.length) {
      clearInterval(timer);
      cb();
    }
  }, 70);
}

function eraseText(cb) {
  const timer = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(timer);
      cb();
    }
  }, 40);
}

function enterMain() {
  choice.style.display = "none";
  document.getElementById("main").style.display = "block";
}

/* 过往页 */
function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none";
  main.style.display = "block";
}
</script>

</body>
</html>
