<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ 你原有的样式，我一个字都没改 -->
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
  cursor: default;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 导航页 ===== */
#nav {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 70%);
  z-index: 50;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}

#nav::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(56,189,248,.8), transparent),
    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 20% 70%, rgba(56,189,248,.6), transparent),
    radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 40% 85%, rgba(56,189,248,.5), transparent),
    radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,.5), transparent);
  pointer-events: none;
  z-index: 0;
}

.nav-title {
  font-size: 12px;
  letter-spacing: 10px;
  color: rgba(255,255,255,.2);
  margin-bottom: 80px;
  z-index: 1;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 40px;
  z-index: 1;
}

.nav-link {
  font-size: 48px;
  font-weight: 600;
  color: #9ca3af;
  letter-spacing: 4px;
  cursor: pointer;
  position: relative;
  transition: color .4s ease;
}

.nav-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -10px;
  width: 0;
  height: 2px;
  background: #38bdf8;
  transition: width .4s ease;
}

.nav-link:hover {
  color: #38bdf8;
}

.nav-link:hover::after {
  width: 100%;
}

/* ===== 现在时间段 ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #1e293b, #0f172a);
  z-index: 10;
  padding: 60px 80px;
  overflow: hidden;
}

.main-header {
  font-size: 13px;
  opacity: .6;
  margin-bottom: 20px;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.main-header .back-btn {
  cursor: pointer;
  color: #475569;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all .3s ease;
}

.main-header .back-btn:hover {
  color: #38bdf8;
  background: rgba(56,189,248,.1);
}

.timeline-now {
  position: relative;
  width: 100%;
  height: calc(100vh - 120px);
  overflow-y: auto;
  scroll-behavior: smooth;
}

.timeline-now::-webkit-scrollbar {
  width: 6px;
}

.timeline-now::-webkit-scrollbar-thumb {
  background: rgba(56,189,248,.3);
  border-radius: 3px;
}

.timeline-now::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom,
    rgba(56,189,248,.6),
    rgba(56,189,248,.1)
  );
  pointer-events: none;
}

.timeline-item {
  position: relative;
  width: 100%;
  padding: 30px 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #38bdf8;
  box-shadow: 0 0 20px rgba(56,189,248,.8);
  cursor: pointer;
  transition: transform .3s ease;
  z-index: 2;
  flex-shrink: 0;
}

.dot:hover {
  transform: scale(1.5);
}

.label {
  position: absolute;
  font-size: 20px;
  font-weight: 700;
  color: #7dd3fc;
  opacity: .7;
  cursor: pointer;
  z-index: 2;
}

.label:hover {
  opacity: 1;
}

.timeline-item:nth-child(odd) .dot {
  order: 2;
}

.timeline-item:nth-child(odd) .label {
  order: 1;
  right: calc(50% + 30px);
}

.timeline-item:nth-child(even) .dot {
  order: 1;
}

.timeline-item:nth-child(even) .label {
  order: 2;
  left: calc(50% + 30px);
}

/* ===== 过去时间段 ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0b0f1a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

#past .past-header {
  font-size: 16px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 6px;
  display: inline-block;
  transition: all .3s ease;
}

#past .past-header:hover {
  color: #38bdf8;
  background: rgba(56,189,248,.1);
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 50px;
}

.memory {
  width: 280px;
  padding: 24px;
  background: rgba(255,255,255,.06);
  border-radius: 14px;
  cursor: pointer;
  transform: rotateX(10deg) scale(.95);
  transition: all .5s ease;
  opacity: .65;
}

.memory:hover {
  transform: rotateX(0) scale(1);
  opacity: 1;
}

.memory-date {
  font-size: 32px;
  font-weight: 800;
  color: #38bdf8;
}

.memory-tag {
  font-size: 14px;
  color: #94a3b8;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(10px);
  transition: all .4s ease;
}

.memory:hover .memory-tag {
  opacity: 1;
  transform: translateY(0);
}

/* ===== SONG 页面（空） ===== */
#song {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #0f0f0f, #1a1a2e);
  z-index: 10;
  padding: 60px 80px;
  overflow-y: auto;
}

#song .back-btn {
  cursor: pointer;
  color: #475569;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 40px;
  transition: all .3s ease;
}

#song .back-btn:hover {
  color: #38bdf8;
  background: rgba(56,189,248,.1);
}

.song-title {
  font-size: 14px;
  letter-spacing: 6px;
  color: rgba(255,255,255,.3);
  margin-bottom: 30px;
}

/* ===== idea / 其他 ===== */
.page-placeholder {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #0f172a, #1a1a2e);
  z-index: 10;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.page-placeholder .back-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  cursor: pointer;
  color: #475569;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all .3s ease;
}

.page-placeholder .back-btn:hover {
  color: #38bdf8;
  background: rgba(56,189,248,.1);
}

.page-placeholder .content {
  font-size: 24px;
  color: #555;
  letter-spacing: 4px;
}

/* ===== 模态框 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px 36px;
  border-radius: 12px;
  width: 90%;
  max-width: 460px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.modal-content {
  font-size: 15px;
  line-height: 1.8;
  color: #cbd5e1;
}

.camera {
  margin-top: 18px;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 22px;
}

/* ===== 相册 ===== */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
}

#album-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

/* 右下角彩蛋入口 */
#main .gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}

/* ===== 打字机 ===== */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 500;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* ===== 6.4 ===== */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 501;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#entry .entry-box {
  font-size: 100px;
  font-weight: 950;
  color: #38bdf8;
  text-shadow:
    0 0 20px rgba(56,189,248,.8),
    0 0 60px rgba(56,189,248,.5),
    0 0 120px rgba(56,189,248,.3);
  animation: pulse 2.5s infinite;
  transition: transform .3s ease;
}

#entry:hover .entry-box {
  transform: scale(1.08);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

/* ===== 生日 ===== */
#birthday {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 600;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#cake {
  font-size: 260px;
  opacity: 0;
  transition: opacity 1.8s ease;
}

#happy {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 64px;
  letter-spacing: 16px;
  color: #ffd1dc;
  opacity: 0;
  transition: opacity 2s ease;
  text-align: center;
}

#message {
  position: absolute;
  top: 26%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  color: #7dd3fc;
  opacity: 0;
  text-align: center;
  max-width: 80%;
  line-height: 1.8;
}

#closeHint {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  display: none;
}

/* ===== ✅ 时空驿站弹窗 ===== */
#pastModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

#pastModal .box {
  background: rgba(20,25,40,.95);
  padding: 36px 56px;
  border-radius: 14px;
  text-align: center;
  border: 1px solid rgba(56,189,248,.15);
}

#pastModal .title {
  font-size: 18px;
  color: rgba(255,255,255,.6);
  letter-spacing: 4px;
  margin-bottom: 30px;
}

#pastModal .btns {
  display: flex;
  gap: 24px;
  justify-content: center;
}

#pastModal .btn {
  padding: 10px 36px;
  border-radius: 24px;
  cursor: pointer;
  font-size: 13px;
  letter-spacing: 1px;
  transition: all .3s ease;
}

#pastModal .enter {
  background: rgba(56,189,248,.12);
  color: #38bdf8;
  border: 1px solid rgba(56,189,248,.25);
}

#pastModal .enter:hover {
  background: rgba(56,189,248,.25);
}

#pastModal .cancel {
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.4);
}

#pastModal .cancel:hover {
  border-color: rgba(255,255,255,.3);
  color: rgba(255,255,255,.6);
}

/* ===== 英文提示 ===== */
#pastHint {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1001;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity .8s ease;
}

#pastHint.show {
  display: flex;
  opacity: 1;
}

#pastHint .text {
  font-size: 18px;
  color: rgba(255,255,255,.35);
  letter-spacing: 8px;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<div id="typewriter"></div>

<div id="entry" onclick="startBirthday()">
  <div class="entry-box">6.4</div>
</div>

<!-- 导航页 -->
<div id="nav">
  <div class="nav-title">SELECT</div>
  <div class="nav-links">
    <div class="nav-link" onclick="goToMain()">现 在</div>
    <div class="nav-link" onclick="goToIdea()">IDEA</div>
    <div class="nav-link" onclick="goToSong()">SONG</div>
    <div class="nav-link" onclick="goToOther()">其 他</div>
  </div>
</div>

<!-- 现在时间段 -->
<div id="main">
  <div class="main-header">
    <span class="back-btn" onclick="goToNav()">◀ BACK</span>
    <span>TIME CAPSULE</span>
  </div>
  <div class="timeline-now" id="timelineNow"></div>
  <div class="gate" onclick="openPastModal()"></div>
</div>

<!-- 过去时间段 -->
<div id="past">
  <div class="past-header" onclick="goToMain()">◀ BACK</div>
  <div class="timeline">
    <div class="memory" onclick="openModal('2023-09-11','在武警院我们相遇。不管过去多久我还是想说，很高兴认识你。')">
      <div class="memory-date">2023-09-11</div>
      <div class="memory-tag">初见</div>
    </div>
    <div class="memory" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="memory-date">2023-06-15</div>
      <div class="memory-tag">未知</div>
    </div>
  </div>
</div>

<!-- SONG 页面（空） -->
<div id="song">
  <div class="back-btn" onclick="goToNav()">◀ BACK</div>
  <div class="song-title">SONG</div>
</div>

<!-- idea 页面 -->
<div id="idea" class="page-placeholder">
  <div class="back-btn" onclick="goToNav()">◀ BACK</div>
  <div class="content">IDEA</div>
</div>

<!-- 其他 页面 -->
<div id="other" class="page-placeholder">
  <div class="back-btn" onclick="goToNav()">◀ BACK</div>
  <div class="content">其 他</div>
</div>

<div id="album">
  <div id="album-page"></div>
  <div class="album-btn" style="left:20px;" onclick="prevImg()">‹</div>
  <div style="display:flex;justify-content:center;align-items:center;height:100%;"><img src=""></div>
  <div class="album-btn" style="right:20px;" onclick="nextImg()">›</div>
  <div id="album-close" onclick="closeAlbum()">✕</div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<!-- ✅ 时空驿站弹窗 -->
<div id="pastModal" onclick="closePastModal()">
  <div class="box" onclick="event.stopPropagation()">
    <div class="title">时空驿站</div>
    <div class="btns">
      <div class="btn enter" onclick="confirmEnterPast()">进入</div>
      <div class="btn cancel" onclick="closePastModal()">取消</div>
    </div>
  </div>
</div>

<!-- ✅ 英文提示 -->
<div id="pastHint">
  <div class="text">ENTERING TIME STATION</div>
</div>

<div id="birthday">
  <div id="cake">🎂</div>
  <div id="happy">生日快乐</div>
  <div id="message"></div>
  <div id="closeHint" onclick="closeBirthday()">✕</div>
</div>

<script>
/* ===== 时间轴数据 ===== */
const timelineData = [
  { date: "2026-06-01", content: "系统开始记录新的轨迹。" },
  { date: "2026-05-25", content: "今天这个小网站正式可以运行了，好有成就感。这是我做的第一个网站，也是第一次正儿八经跑代码，惊喜吧应该，其实这个想法不算突然，只是没法确定代码可以跑起来，可我前两天还是决定先悄悄藏在戒指上，你应该暂时发现不了，上次的八千字讲了很多人很多事，但我想说那并不是全部，这个网站会保持更新的，也会有很多可以探索的地方，这个网站，只关于你，也只属于我们。" },
  { date: "2024-06-04", content: "首先祝你生日快乐" }
];

function renderTimeline() {
  const container = document.getElementById("timelineNow");
  container.innerHTML = "";
  timelineData.forEach(item => {
    const div = document.createElement("div");
    div.className = "timeline-item";
    div.innerHTML = `<div class="dot" onclick="openModal('${item.date}','${item.content.replace(/'/g,"\\'")}')"></div><div class="label" onclick="openModal('${item.date}','${item.content.replace(/'/g,"\\'")}')">${item.date}</div>`;
    container.appendChild(div);
  });
}

/* ===== 导航跳转 ===== */
function goToNav() {
  document.getElementById("main").style.display = "none";
  document.getElementById("past").style.display = "none";
  document.getElementById("idea").style.display = "none";
  document.getElementById("song").style.display = "none";
  document.getElementById("other").style.display = "none";
  document.getElementById("nav").style.display = "flex";
}

function goToMain() {
  document.getElementById("nav").style.display = "none";
  document.getElementById("past").style.display = "none";
  document.getElementById("idea").style.display = "none";
  document.getElementById("song").style.display = "none";
  document.getElementById("other").style.display = "none";
  document.getElementById("main").style.display = "block";
}

function goToPast() {
  document.getElementById("main").style.display = "none";
  document.getElementById("nav").style.display = "none";
  document.getElementById("past").style.display = "block";
}

function goToIdea() {
  document.getElementById("nav").style.display = "none";
  document.getElementById("idea").style.display = "flex";
}

function goToSong() {
  document.getElementById("nav").style.display = "none";
  document.getElementById("song").style.display = "block";
}

function goToOther() {
  document.getElementById("nav").style.display = "none";
  document.getElementById("other").style.display = "flex";
}

/* ===== 登录 ===== */
const KEY = "56";
const input = document.getElementById("key");
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && input.value !== KEY) {
    alert("密钥错误");
    input.value = "";
  }
});
input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      playTypewriter();
    } else {
      goToNav();
    }
  }
});

/* ===== 相册 ===== */
const photosByDate = {
  "2023-09-11": [
    "https://raw.githubusercontent.com/ac091/log/main/qu.jpg",
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ],
  "2023-06-15": [
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ]
};
let currentPhotos = [], currentIndex = 0;

function openModal(time, content) {
  document.getElementById("modal-time").innerText = time;
  document.getElementById("modal-content").innerHTML = content;
  if (photosByDate[time]) {
    const camera = document.createElement("div");
    camera.className = "camera";
    camera.innerHTML = "📷";
    camera.onclick = () => openAlbum(photosByDate[time]);
    document.getElementById("modal-content").appendChild(camera);
  }
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function openAlbum(p) {
  currentPhotos = p;
  currentIndex = 0;
  document.querySelector("#album img").src = currentPhotos[0];
  document.getElementById("album-page").innerText = "1 / " + currentPhotos.length;
  document.getElementById("album").style.display = "block";
}

function prevImg() {
  if (currentIndex > 0) {
    currentIndex--;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText = (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function nextImg() {
  if (currentIndex < currentPhotos.length - 1) {
    currentIndex++;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText = (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function closeAlbum() {
  document.getElementById("album").style.display = "none";
}

/* ===== 打字机 & 生日 ===== */
const tw = document.getElementById("typewriter");
const typeSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-typewriter-key-1368.mp3");
typeSound.volume = 0.3;

function playTypewriter() {
  tw.style.display = "flex";
  typeText("这近三年来最美好的事是什么？", () => {
    setTimeout(() => eraseText(() => {
      typeText("想想就会发现根本想不完。", () => {
        setTimeout(() => {
          tw.style.display = "none";
          if (!localStorage.getItem("asked")) {
            document.getElementById("entry").style.display = "flex";
          } else {
            goToNav();
          }
        }, 1800);
      });
    }), 1400);
  });
}

function typeText(t, cb) {
  let i = 0;
  tw.innerHTML = "";
  const r = setInterval(() => {
    tw.innerHTML += t.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= t.length) {
      clearInterval(r);
      cb();
    }
  }, 130);
}

function eraseText(cb) {
  const r = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(r);
      cb();
    }
  }, 70);
}

const cake = document.getElementById("cake");
const happy = document.getElementById("happy");
const message = document.getElementById("message");
const closeHint = document.getElementById("closeHint");

function startBirthday() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("birthday").style.display = "flex";
  setTimeout(() => cake.style.opacity = "1", 300);
  setTimeout(() => cake.style.opacity = "0", 3300);
  setTimeout(() => happy.style.opacity = "1", 4300);
  setTimeout(() => happy.style.opacity = "0", 7800);
  setTimeout(() => typeMessage("首先祝你生日快乐"), 9800);
}

function typeMessage(t) {
  let i = 0;
  message.style.opacity = "1";
  const r = setInterval(() => {
    message.innerHTML += t.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= t.length) {
      clearInterval(r);
      closeHint.style.display = "block";
    }
  }, 200);
}

function closeBirthday() {
  document.getElementById("birthday").style.display = "none";
  goToNav();
  localStorage.setItem("asked", "1");
}

/* ===== ✅ 时空驿站弹窗逻辑 ===== */
function openPastModal() {
  document.getElementById("pastModal").style.display = "flex";
}

function closePastModal() {
  document.getElementById("pastModal").style.display = "none";
}

function confirmEnterPast() {
  closePastModal();
  enterPastSequence();
}

/* ===== ✅ 英文提示 + 进入 ===== */
function enterPastSequence() {
  const hint = document.getElementById("pastHint");
  hint.classList.add("show");

  setTimeout(() => {
    hint.classList.remove("show");
    goToPast();
  }, 2000);
}

/* ===== 初始渲染 ===== */
renderTimeline();
</script>
