<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 你之前的样式完全没变，这里省略重复代码，直接用你现有的 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: radial-gradient(circle at 30% 30%, #121826, #08090d); color: #cfd8e3; overflow: hidden; }
#login { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
.login-inner { width: 420px; text-align: center; }
.login-inner p { font-size: 11px; letter-spacing: 6px; opacity: .35; margin-bottom: 40px; font-weight: 300; }
input.key { width: 100%; padding: 18px 0; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.15); color: #fff; font-size: 22px; text-align: center; letter-spacing: 14px; outline: none; }
#question { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.82); backdrop-filter: blur(6px); z-index: 500; justify-content: center; align-items: center; }
.q-box { width: 90%; max-width: 440px; padding: 44px 36px; background: rgba(12,14,18,.92); border: 1px solid rgba(255,255,255,.06); border-radius: 14px; text-align: center; }
.q-box h3 { font-size: 15px; font-weight: 400; line-height: 1.9; color: #cbd5e1; margin-bottom: 30px; }
.q-box textarea { width: 100%; height: 90px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.2); padding: 12px 0; color: #fff; font-size: 14px; outline: none; resize: none; }
.q-box button { margin-top: 28px; width: 100%; padding: 14px; border: none; border-radius: 8px; background: rgba(56,189,248,.15); color: #38bdf8; font-size: 14px; letter-spacing: 2px; cursor: pointer; }
#main { display: none; position: fixed; inset: 0; background: #2a3649; z-index: 10; padding: 60px 80px; overflow-y: auto; }
.main-header { font-size: 13px; opacity: .5; margin-bottom: 40px; letter-spacing: 2px; }
.list { display: flex; flex-direction: column; gap: 14px; }
.item { padding: 18px 22px; background: rgba(255,255,255,.06); border-left: 3px solid rgba(56,189,248,.6); border-radius: 6px; cursor: pointer; }
#past { display: none; position: fixed; inset: 0; background: #0f172a; z-index: 200; padding: 60px 80px; overflow-y: auto; }
.past-header { font-size: 13px; color: #475569; margin-bottom: 50px; cursor: pointer; }
.timeline { position: relative; padding-left: 30px; border-left: 2px solid rgba(255,255,255,.08); }
.node { position: relative; margin-bottom: 50px; cursor: pointer; }
.node::before { content:""; position: absolute; left:-41px; top:4px; width:10px; height:10px; background:#38bdf8; border-radius:50%; }
.node-time { font-size: 14px; color: #38bdf8; margin-bottom: 6px; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 999; justify-content: center; align-items: center; }
.modal-box { background: #1e293b; padding: 30px 36px; border-radius: 12px; width: 90%; max-width: 460px; max-height: 70vh; overflow-y: auto; }
.modal-time { font-size: 14px; color: #38bdf8; margin-bottom: 15px; }
.modal-content { font-size: 15px; line-height: 1.8; color: #cbd5e1; }
.camera { margin-top: 18px; width: 48px; height: 48px; background: rgba(255,255,255,.08); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 22px; }
#album { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; }
#album img { max-width: 90%; max-height: 90%; border-radius: 8px; }
.album-btn { position: absolute; top: 50%; transform: translateY(-50%); color: #fff; font-size: 40px; cursor: pointer; user-select: none; }
#album-close { position: absolute; top: 20px; right: 30px; font-size: 28px; color: #fff; cursor: pointer; }
#album-page { position: absolute; top: 20px; left: 30px; color: #fff; font-size: 14px; letter-spacing: 1px; }
.gate { position: fixed; bottom: 30px; right: 30px; width: 10px; height: 10px; background: rgba(56,189,248,.5); border-radius: 50%; cursor: pointer; z-index: 20; }
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<div id="question">
  <div class="q-box">
    <h3>将近三年来<br><br>你印象最深的事情<br><br>是什么</h3>
    <textarea id="answer" placeholder="写下你的答案…"></textarea>
    <button onclick="submitAnswer()">提交</button>
  </div>
</div>

<div id="main">...</div>
<div id="past">...</div>
<div id="album">...</div>
<div class="gate" onclick="openPast()"></div>
<div class="modal" id="modal" onclick="closeModal()">...</div>

<script>
const KEY = "56";

// ✅ 请再次确认这串 Token 是你刚刚新生成的
const GITHUB_TOKEN = "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";
const OWNER = "ac091";
const REPO = "log";

const login = document.getElementById("login");
const main = document.getElementById("main");
const past = document.getElementById("past");
const input = document.getElementById("key");
const question = document.getElementById("question");

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      question.style.display = "flex";
    } else {
      main.style.display = "block";
    }
  }
});

// ✅ 这里是关键：加了详细的错误提示
function submitAnswer() {
  const text = document.getElementById("answer").value.trim();
  if (!text) return alert("写点什么嘛～");

  fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${GITHUB_TOKEN}`, // 改用 Bearer
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: "💌 登录回答",
      body: `> ${text}\n\n---\n_来自网页登录_`
    })
  })
  .then(async response => {
    if (!response.ok) {
      const errorData = await response.json();
      // 这里会把 GitHub 返回的具体原因弹出来
      alert("提交失败！\n\nGitHub 说：" + (errorData.message || "未知错误"));
      throw new Error("GitHub API Error");
    }
    return response.json();
  })
  .then(data => {
    alert("提交成功！");
    localStorage.setItem("asked", "1");
    question.style.display = "none";
    main.style.display = "block";
  })
  .catch(err => {
    console.error(err);
  });
}

// ===== 以下是你原有的相册代码，保持不变 =====
const photosByDate = {
  "2023-09-11": ["https://raw.githubusercontent.com/ac091/log/main/qu.jpg","https://raw.githubusercontent.com/ac091/log/main/yi.jpg"],
  "2023-06-15": ["https://raw.githubusercontent.com/ac091/log/main/yi.jpg"]
};
let currentPhotos = [], currentIndex = 0;
function openModal(t,c){modalTime.innerText=t;modalContent.innerHTML=c;if(photosByDate[t]){const cam=document.createElement("div");cam.className="camera";cam.innerHTML="📷";cam.onclick=()=>openAlbum(photosByDate[t]);modalContent.appendChild(cam);}modal.style.display="flex";}
function openAlbum(p){currentPhotos=p;currentIndex=0;document.querySelector("#album img").src=currentPhotos[0];document.getElementById("album-page").innerText=`1 / ${p.length}`;document.getElementById("album").style.display="block";}
function prevImg(){if(currentIndex>0){currentIndex--;document.querySelector("#album img").src=currentPhotos[currentIndex];document.getElementById("album-page").innerText=(currentIndex+1)+"/"+currentPhotos.length;}}
function nextImg(){if(currentIndex<currentPhotos.length-1){currentIndex++;document.querySelector("#album img").src=currentPhotos[currentIndex];document.getElementById("album-page").innerText=(currentIndex+1)+"/"+currentPhotos.length;}}
function closeAlbum(){document.getElementById("album").style.display="none";}
function closeModal(){modal.style.display="none";}
function openPast(){main.style.display="none";past.style.display="block";}
function closePast(){past.style.display="none";main.style.display="block";}
</script>
</body>
</html>
