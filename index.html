<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MEMORY SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #e5e7eb;
  overflow: hidden;
}

/* ===== 背景（亮一点） ===== */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(120deg, #1e3a5f, #2563a7, #1e3a5f);
  background-size: 400% 400%;
  animation: gradient 20s ease infinite;
  z-index: -1;
}
@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== 登录（黑灰） ===== */
#login {
  position: fixed;
  inset: 0;
  background: rgba(30,30,30,.75);
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: opacity .8s ease;
}
#login.fade-out { opacity: 0; pointer-events: none; }

.login-box p {
  font-size: 13px;
  opacity: .6;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.login-box input {
  background: transparent;
  border: 1px solid rgba(255,255,255,.25);
  color: #fff;
  padding: 14px 18px;
  width: 240px;
  font-size: 20px;
  border-radius: 8px;
  text-align: center;
  letter-spacing: 6px;
  outline: none;
}

/* ===== 主内容 ===== */
#main {
  display: none;
  padding: 80px 20px 120px;
  max-width: 600px;
  margin: auto;
}

/* ===== 时间 ===== */
.time {
  padding: 18px 20px;
  border-left: 3px solid rgba(255,255,255,.6);
  margin-bottom: 14px;
  cursor: pointer;
  background: rgba(255,255,255,.06);
}

/* ===== 弹出框 ===== */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.popup-content {
  background: rgba(20,20,20,.95);
  padding: 30px 36px;
  border-radius: 14px;
  max-width: 420px;
  color: #e5e7eb;
  line-height: 1.9;
  font-size: 14px;
}
.close {
  margin-top: 20px;
  text-align: right;
  font-size: 13px;
  opacity: .6;
  cursor: pointer;
}

/* ===== 隐藏按钮 ===== */
.secret {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  cursor: pointer;
  z-index: 100;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 登录 -->
<div id="login">
  <div class="login-box">
    <p>SYSTEM SECURED</p >
    <input id="pass" type="password" placeholder="KEY" maxlength="4">
  </div>
</div>

<!-- 主内容 -->
<div id="main">
  <div class="time" onclick="openPopup('现在的内容<br><br>网页已经通了，接下来只属于我们。')">
    <div>2026-05-25</div>
  </div>

  <div class="time" onclick="openPopup('那时候我们还不知道，<br>后来会发生这么多事。')">
    <div>很久以前</div>
  </div>
</div>

<!-- 弹出框 -->
<div class="popup" id="popup" onclick="closePopup()">
  <div class="popup-content" onclick="event.stopPropagation()">
    <div id="popup-text"></div>
    <div class="close">关闭</div>
  </div>
</div>

<!-- 隐藏按钮 -->
<div class="secret" onclick="toggleSecret()"></div>

<script>
const PASSWORD = "56";

document.getElementById("pass").addEventListener("keyup", e => {
  if (e.target.value === PASSWORD) {
    document.getElementById("login").classList.add("fade-out");
    setTimeout(() => {
      document.getElementById("main").style.display = "block";
    }, 800);
  }
});

function openPopup(text) {
  document.getElementById("popup-text").innerHTML = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

let secret = false;
function toggleSecret() {
  secret = !secret;
  alert(secret ? "你找到了过去的入口" : "已回到现在");
}
</script>

</body>
</html>
