<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.box {
    background: rgba(22, 27, 34, 0.8);
    border: 1px solid rgba(56, 189, 248, 0.2);
    padding: 40px 60px;
    border-radius: 16px;
    text-align: center;
}
input {
    background: transparent;
    border: 1px solid #30363d;
    color: #38bdf8;
    padding: 12px 15px;
    width: 200px;
    border-radius: 8px;
    outline: none;
}
button {
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border: none;
    color: white;
    padding: 12px 30px;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 20px;
}
.content { display: none; margin-top: 30px; }
.entry { border-left: 3px solid #38bdf8; padding: 15px 20px; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="box" id="login">
  <div>SYSTEM LOGIN</div>
  <input type="password" id="pass" placeholder="Access Key">
  <button onclick="check()">ENTER</button>
</div>

<div class="box content" id="main">
  <h2>MEMORY FRAGMENTS</h2>
  <div class="entry">
    <div>2026-05-24</div>
    这是测试内容。如果看到这段话，说明网页已经通了！
  </div>
  <div class="entry">
    <div>2026-05-25</div>
    以后我会在这里写下更多的话。
  </div>
</div>

<script>
const PASSWORD = "0521"; 
function check() {
  const input = document.getElementById("pass").value;
  if (input === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    alert("Access Denied");
  }
}
</script>

</body>
</html>
