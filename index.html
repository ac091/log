<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MEMORY SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #c9d1d9;
  overflow: hidden;
}

/* ===== 背景 ===== */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(120deg, #0f172a, #1e293b, #0f172a);
  background-size: 400% 400%;
  animation: gradient 20s ease infinite;
  z-index: -1;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.85);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: opacity .8s ease;
}
#login.fade-out { opacity: 0; pointer-events: none; }

.login-box p {
  font-size: 14px;
  opacity: .7;
  margin-bottom: 24px;
  letter-spacing: 3px;
}

.login-box input {
  background: transparent;
  border: 1px solid #38bdf8;
  color: #38bdf8;
  padding: 18px 22px;
  width: 260px;
  font-size: 22px;
  border-radius: 10px;
  text-align: center;
  letter-spacing: 8px;
  outline: none;
}

/* ===== 主内容 ===== */
#main {
  display: none;
  padding: 80px 20px 120px;
  max-width: 600px;
  margin: auto;
}

/* ===== 时间列表 ===== */
.time {
  padding: 18px 20px;
  border-left: 3px solid #38bdf8;
  margin-bottom: 14px;
  cursor: pointer;
  background: rgba(255,255,255,.02);
  transition: background .2s;
}
.time:hover {
  background: rgba(56,189,248,.08);
}

/* ===== 弹出内容 ===== */
.popup {
  display: none;
  margin-top: 12px;
  padding: 16px 20px;
  border-left: 2px solid rgba(56,189,248,.6);
  background: rgba(0,0,0,.25);
  font-size: 14px;
  line-height: 1.9;
}

/* ===== 隐藏的时光按钮 ===== */
.secret {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(56,189,248,.25);
  cursor: pointer;
  z-index: 100;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 登录 -->
<div id="login">
  <div class="login-box">
    <p>SYSTEM SECURED</p >
    <input id="pass" type="password" placeholder="KEY" maxlength="4">
  </div>
</div>

<!-- 主内容 -->
<div id="main">
  <div class="time" onclick="toggle(this)">
    <div>2026-05-25</div>
    <div class="popup">这是现在的内容。<br>网页已经通了，接下来只属于我们。</div>
  </div>

  <div class="time" onclick="toggle(this)">
    <div>很久以前</div>
    <div class="popup">那时候我们还不知道，后来会发生这么多事。</div>
  </div>
</div>

<!-- 隐藏按钮 -->
<div class="secret" onclick="toggleSecret()"></div>

<script>
const PASSWORD = "56";

document.getElementById("pass").addEventListener("keyup", e => {
  if (e.target.value === PASSWORD) {
    document.getElementById("login").classList.add("fade-out");
    setTimeout(() => {
      document.getElementById("main").style.display = "block";
    }, 800);
  }
});

function toggle(el) {
  const popup = el.querySelector(".popup");
  popup.style.display = popup.style.display === "block" ? "none" : "block";
}

let secret = false;
function toggleSecret() {
  secret = !secret;
  alert(secret ? "你找到了过去的入口" : "已回到现在");
}
</script>

</body>
</html>
