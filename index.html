<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* 全局设置：深色背景 + 科技蓝 */
body {
    background: #0d1117; /* 稍微亮一点的深灰蓝 */
    color: #c9d1d9; /* 柔和的白字 */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}

/* 背景动态网格（可选，显得很高级） */
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
}

/* 登录框：磨砂玻璃效果 */
#login {
    background: rgba(22, 27, 34, 0.8);
    border: 1px solid rgba(56, 189, 248, 0.2);
    backdrop-filter: blur(10px);
    padding: 40px 60px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 0 40px rgba(56, 189, 248, 0.1);
}

#login div:first-child { color: #38bdf8; letter-spacing: 4px; margin-bottom: 20px; }

input {
    background: transparent;
    border: 1px solid #30363d;
    color: #38bdf8;
    padding: 12px 15px;
    width: 200px;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
}
input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }

button {
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border: none;
    color: white;
    padding: 12px 30px;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 20px;
    font-weight: bold;
    transition: 0.3s;
}
button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }

/* 内容区 */
#main { display: none; max-width: 700px; padding: 20px; }
h2 { text-align: center; color: #38bdf8; font-weight: 300; letter-spacing: 2px; }

.entry {
    background: rgba(22, 27, 34, 0.6);
    border-left: 3px solid #38bdf8;
    padding: 15px 20px;
    margin-bottom: 20px;
    border-radius: 0 8px 8px 0;
}
.date { font-size: 12px; color: #58a6ff; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="login">
  <div>SYSTEM LOGIN</div>
  <input type="password" id="pass" placeholder="Access Key">
  <br>
  <button onclick="check()">ENTER</button>
</div>

<div id="main">
  <h2>MEMORY FRAGMENTS</h2>
  <div id="content"></div>
</div>

<script>
// 这里改成你们两个人的数字暗号
const PASSWORD = "0521"; 

function check() {
  const input = document.getElementById("pass").value;
  if (input === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    loadData();
  } else {
    alert("Access Denied");
  }
}

function loadData() {
  fetch('data.json')
    .then(res => res.json())
    .then(data => {
      const box = document.getElementById("content");
      box.innerHTML = "";
      data.forEach(item => {
        box.innerHTML += `<div class="entry"><div class="date">${item.date}</div>${item.text}</div>`;
      });
    })
    .catch(err => {
      document.getElementById("content").innerHTML = `
        <div class="entry">
          <div class="date">2026.05.24</div>
          系统初始化完成，等待数据写入...</div>
      `;
    });
}
</script>

</body>
</html>
