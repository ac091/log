<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 主界面 ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: #111827;
  z-index: 10;
  padding: 60px 80px;
  overflow-y: auto;
}

.main-header {
  font-size: 13px;
  opacity: .5;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.main-content {
  max-width: 600px;
}

/* 时间轴 */
.timeline {
  border-left: 2px solid rgba(255,255,255,.1);
  padding-left: 30px;
}

.event {
  margin-bottom: 50px;
  opacity: .9;
}

.event-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 8px;
}

.event-text {
  font-size: 15px;
  line-height: 1.8;
  color: #9ca3af;
}

/* ===== 过去页面 ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 50px;
  font-size: 13px;
  color: #64748b;
}

.back {
  background: none;
  border: none;
  color: #64748b;
  cursor: pointer;
  font-size: 13px;
}

.back:hover {
  color: #fff;
}

/* 隐藏入口 */
#gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}

.fade {
  animation: fade .8s ease forwards;
}

@keyframes fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- 登录 -->
<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p >
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<!-- 现在 -->
<div id="main" class="fade">
  <div class="main-header">2026 / 05 / 25</div>
  <div class="main-content">
    <p style="line-height:1.8; color:#9ca3af;">
      网页已经通了。<br>
      接下来的内容，只属于我们。
    </p >
  </div>
</div>

<!-- 过去 -->
<div id="past">
  <div class="past-header">
    <span>◎ 时光回溯</span>
    <button class="back" onclick="closePast()">← 返回</button>
  </div>

  <div class="timeline">
    <div class="event">
      <div class="event-time">2023-09-11</div>
      <div class="event-text">武警院相遇。</div>
    </div>

    <div class="event">
      <div class="event-time">2023-06-15</div>
      <div class="event-text">那时候我们还不知道，后来会发生这么多事。</div>
    </div>

    <div class="event">
      <div class="event-time">2023-08-21</div>
      <div class="event-text">夏天的晚风吹过，带来了远方的消息。</div>
    </div>

    <div class="event">
      <div class="event-time">2024-05-20</div>
      <div class="event-text">天空很蓝，云走得很慢，时间仿佛停驻。</div>
    </div>
  </div>
</div>

<!-- 隐藏入口 -->
<div id="gate" onclick="openPast()"></div>

<script>
const KEY = "56";

const login = document.getElementById("login");
const main = document.getElementById("main");
const past = document.getElementById("past");
const input = document.getElementById("key");

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    main.classList.add("fade");
    main.style.display = "block";
  } else if (input.value.length === 4) {
    alert("密钥错误");
    input.value = "";
  }
});

function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none";
  main.style.display = "block";
}
</script>

</body>
</html>
