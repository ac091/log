<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MEMORY SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #e5e7eb;
  overflow: hidden; /* 防止滚动 */
}

/* ===== 登录页背景 (静态黑灰) ===== */
#login-screen {
  position: fixed;
  inset: 0;
  background-color: #1a1a1a; /* 静态深黑灰 */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

/* 登录框样式 */
.login-box {
  background: rgba(255, 255, 255, 0.05);
  padding: 40px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  text-align: center;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

.login-box h2 {
  margin-bottom: 25px;
  font-weight: 300;
  letter-spacing: 2px;
  color: #c9d1d9;
}

/* 密码输入框 */
.password-input {
  width: 100%;
  padding: 12px 15px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid #444;
  border-radius: 6px;
  color: #fff;
  font-size: 16px;
  margin-bottom: 20px;
  outline: none;
}

.password-input::placeholder {
  color: #666;
}

/* 登录按钮 */
.login-btn {
  width: 100%;
  padding: 12px;
  background: #2563a7;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s;
}

.login-btn:hover {
  background: #1d4ed8;
}

/* ===== 主界面背景 (静谧蓝) ===== */
#main-screen {
  display: none; /* 默认隐藏 */
  position: fixed;
  inset: 0;
  background: #1e293b; /* 静谧蓝 */
  z-index: 10;
  padding: 40px;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

/* 隐蔽的时光按钮 (右下角小圆点) */
.time-dot {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 12px;
  height: 12px;
  background: #38bdf8; /* 亮蓝色小点 */
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
  z-index: 20;
  transition: transform 0.3s;
}

.time-dot:hover {
  transform: scale(1.5);
}

/* 记忆列表 */
.memory-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 20px;
}

.memory-item {
  padding: 20px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.memory-item:hover {
  background: rgba(255, 255, 255, 0.08);
  transform: translateX(5px);
}

.memory-time {
  font-size: 18px;
  font-weight: bold;
  color: #38bdf8;
  margin-bottom: 5px;
}

.memory-preview {
  font-size: 14px;
  color: #94a3b8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== 过去的界面 (新全屏) ===== */
#past-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #2c1b47; /* 暗紫色背景 */
  z-index: 200;
  padding: 60px 40px;
  overflow-y: auto;
}

.past-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  color: #e9d5ff;
}

.past-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
}

.past-card {
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 12px;
  padding: 20px;
  color: #ddd;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}

.past-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
  border-color: rgba(168, 85, 247, 0.6);
}

.past-time {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #c084fc;
}

.past-content {
  font-size: 14px;
  line-height: 1.6;
  color: #aaa;
  max-height: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 4; /* 限制行数 */
  -webkit-box-orient: vertical;
}

/* 弹窗样式 (用于主界面点击) */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 500;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 30px;
  width: 80%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}

.modal-title {
  font-size: 20px;
  margin-bottom: 15px;
  color: #38bdf8;
}

.modal-text {
  font-size: 16px;
  line-height: 1.6;
  color: #cbd5e1;
}

.close-btn {
  position: absolute;
  top: 15px;
  right: 20px;
  background: none;
  border: none;
  color: #94a3b8;
  font-size: 24px;
  cursor: pointer;
}

.close-btn:hover {
  color: #fff;
}
</style>

</head>
<body>

<!-- 1. 登录界面 -->
<div id="login-screen">
  <div class="login-box">
    <h2>SYSTEM LOGIN</h2>
    <input type="password" id="password-input" class="password-input" placeholder="请输入访问密钥">
    <button id="login-btn" class="login-btn">AUTHENTICATE</button>
  </div>
</div>

<!-- 2. 主界面 -->
<div id="main-screen">
  <div class="header">
    <h1 style="font-weight: 300; letter-spacing: 2px;">记忆存档</h1>
    <small>已登录</small>

  <div class="memory-list" id="memory-list">

  </div>

  <!-- 隐蔽的时光按钮 -->
  <div class="time-dot" onclick="showPastScreen()"></div>
</div>

<!-- 3. 过去的界面 (全屏新布局) -->
<div id="past-screen">
  <div class="past-header">
    <h2>◎ 时光回溯</h2>
    <button onclick="hidePastScreen()" style="background:none; border:none; color:#e9d5ff; font-size:16px; cursor:pointer;">← 返回主界面</button>
  </div>
  <div class="past-grid" id="past-grid">
    <!-- 这里的内容由JS生成 -->
  </div>
</div>

<!-- 4. 主界面点击弹出的小框 -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">×</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
  </div>
</div>
