<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at 30% 20%, #1b263b, #0d1525);
  color: #e5e7eb;
  overflow: hidden;
}

/* 登录页 */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 400px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 6px;
  opacity: .35;
  margin-bottom: 40px;
}

input.key {
  width: 100%;
  padding: 18px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  color: #fff;
  font-size: 22px;
  text-align: center;
  letter-spacing: 14px;
  outline: none;
}

/* 主页面 */
#main {
  display: none;
  position: fixed;
  inset: 0;
  padding: 70px 100px;
  overflow-y: auto;
}

.main-header {
  font-size: 14px;
  letter-spacing: 3px;
  opacity: .5;
  margin-bottom: 50px;
}

.list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.item {
  padding: 24px;
  background: rgba(255,255,255,.05);
  border-radius: 14px;
  cursor: pointer;
  transition: all .3s ease;
}

.item:hover {
  background: rgba(255,255,255,.1);
  transform: translateY(-4px);
}

.date {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 10px;
  color: #7dd3fc;
}

/* 过往页 */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  padding: 70px 100px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 60px;
  cursor: pointer;
}

.timeline {
  position: relative;
  padding-left: 30px;
  border-left: 2px solid rgba(255,255,255,.08);
}

.node {
  position: relative;
  margin-bottom: 60px;
  cursor: pointer;
}

.node::before {
  content: "";
  position: absolute;
  left: -41px;
  top: 6px;
  width: 12px;
  height: 12px;
  background: #38bdf8;
  border-radius: 50%;
  box-shadow: 0 0 10px #38bdf8;
}

.node-time {
  font-size: 18px;
  font-weight: 500;
  color: #38bdf8;
}

/* 弹窗 */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 36px 42px;
  border-radius: 16px;
  width: 90%;
  max-width: 480px;
  max-height: 70vh;
  overflow-y: auto;
  line-height: 1.9;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 16px;
}

.modal-content {
  font-size: 15px;
  color: #e5e7eb;
}

/* 相册 */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 44px;
  color: #fff;
  cursor: pointer;
}

#album-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

.gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 12px;
  height: 12px;
  background: #38bdf8;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 12px #38bdf8;
  z-index: 20;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<div id="main">
  <div class="main-header">RECENT LOGS</div>
  <div class="list">
    <div class="item" onclick="openModal('2026-05-25','今天这个小网站正式可以运行了，好有成就感。这是我做的第一个网站，也是第一次正儿八经跑代码，惊喜吧应该，其实这个想法不算突然，只是没法确定代码可以跑起来，可我前两天还是决定先悄悄藏在戒指上，你应该暂时发现不了，上次的八千字讲了很多人很多事，但我想说那并不是全部，这个网站会保持更新的，也会有很多可以探索的地方，这个网站，只关于你，也只属于我们。')">
      <div class="date">2026.05.25</div>
    </div>
    <div class="item" onclick="openModal('2026-06-01','系统开始记录新的轨迹。')">
      <div class="date">2026.06.01</div>
    </div>
  </div>
</div>

<div id="past">
  <div class="past-header" onclick="closePast()">◀ BACK</div>
  <div class="timeline">
    <div class="node" onclick="openModal('2023-09-11','在武警院我们相遇。不管过去多久我还是想说，很高兴认识你。')">
      <div class="node-time">2023 · 09 · 11</div>
    </div>
    <div class="node" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="node-time">2023 · 06 · 15</div>
    </div>
  </div>
</div>

<div id="album">
  <div id="album-page"></div>
  <div class="album-btn" style="left:20px;" onclick="prevImg()">‹</div>
  <div style="display:flex;justify-content:center;align-items:center;height:100%;">
    <img src="">
  </div>
  <div class="album-btn" style="right:20px;" onclick="nextImg()">›</div>
  <div id="album-close" onclick="closeAlbum()">✕</div>
</div>

<div class="gate" onclick="openPast()"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
const KEY = "56";

const login = document.getElementById("login");
const main = document.getElementById("main");
const input = document.getElementById("key");
const modal = document.getElementById("modal");
const modalTime = document.getElementById("modal-time");
const modalContent = document.getElementById("modal-content");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && input.value !== KEY) {
    alert("密钥错误");
    input.value = "";
  }
});

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    main.style.display = "block";
  }
});

const photosByDate = {
  "2023-09-11": [
    "https://raw.githubusercontent.com/ac091/log/main/qu.jpg",
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ],
  "2023-06-15": [
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ]
};

let currentPhotos = [];
let currentIndex = 0;

function openModal(time, content) {
  modalTime.innerText = time;
  modalContent.innerHTML = content;

  if (photosByDate[time]) {
    const camera = document.createElement("div");
    camera.style.cssText = "margin-top:18px;font-size:22px;cursor:pointer;";
    camera.innerHTML = "📷";
    camera.onclick = () => openAlbum(photosByDate[time]);
    modalContent.appendChild(camera);
  }

  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none";
  main.style.display = "block";
}

function openAlbum(photos) {
  currentPhotos = photos;
  currentIndex = 0;
  document.querySelector("#album img").src = currentPhotos[currentIndex];
  document.getElementById("album-page").innerText =
    (currentIndex + 1) + " / " + currentPhotos.length;
  document.getElementById("album").style.display = "block";
}

function prevImg() {
  if (currentIndex > 0) {
    currentIndex--;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function nextImg() {
  if (currentIndex < currentPhotos.length - 1) {
    currentIndex++;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function closeAlbum() {
  document.getElementById("album").style.display = "none";
}
</script>

</body>
</html>
