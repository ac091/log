<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 现在（✅ 已提亮） ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: #2a3649; /* ← 这里变亮了 */
  z-index: 10;
  padding: 60px 80px;
  overflow-y: auto;
}

.main-header {
  font-size: 13px;
  opacity: .5;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.item {
  padding: 18px 22px;
  background: rgba(255,255,255,.06);
  border-left: 3px solid rgba(56,189,248,.6);
  border-radius: 6px;
  cursor: pointer;
}

.item:hover {
  background: rgba(255,255,255,.09);
}

/* ===== 过去 ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0f172a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
}

/* 时间线 */
.timeline {
  position: relative;
  padding-left: 30px;
  border-left: 2px solid rgba(255,255,255,.08);
}

.node {
  position: relative;
  margin-bottom: 50px;
  cursor: pointer;
}

.node::before {
  content: "";
  position: absolute;
  left: -41px;
  top: 4px;
  width: 10px;
  height: 10px;
  background: #38bdf8;
  border-radius: 50%;
}

.node-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 6px;
}

.node-text {
  font-size: 14px;
  color: #94a3b8;
}

/* ===== 弹窗 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px 36px;
  border-radius: 12px;
  width: 90%;
  max-width: 460px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.modal-content {
  font-size: 15px;
  line-height: 1.8;
  color: #cbd5e1;
}

/* 入口 */
.gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}
</style>
</head>

<body>

<!-- 登录 -->
<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p >
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<!-- 现在 -->
<div id="main">
  <div class="main-header">RECENT LOGS</div>
  <div class="list">
    <div class="item" onclick="openModal('2026-05-25','网页已经通了。接下来的内容，只属于我们。')">2026-05-25</div>
    <div class="item" onclick="openModal('2026-06-01','系统开始记录新的轨迹。')">2026-06-01</div>
    <div class="item" onclick="openModal('2026-06-12','某些信号在远处闪烁。')">2026-06-12</div>
    <div class="item" onclick="openModal('2026-07-01','今天天气很好，我想你了。')">2026-07-01</div>
  </div>
</div>

<!-- 过去 -->
<div id="past">
  <div class="past-header" onclick="closePast()">◀ BACK</div>
  <div class="timeline">
    <div class="node" onclick="openModal('2023-09-11','武警院相遇。那是第一个锚点。')">
      <div class="node-time">2023-09-11</div>
      <div class="node-text">武警院相遇</div>
    </div>
    <div class="node" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="node-time">2023-06-15</div>
      <div class="node-text">初识</div>
    </div>
    <div class="node" onclick="openModal('2023-08-21','夏天的晚风吹过，带来了远方的消息。')">
      <div class="node-time">2023-08-21</div>
      <div class="node-text">夏夜</div>
    </div>
  </div>
</div>

<!-- 入口 -->
<div class="gate" onclick="openPast()"></div>

<!-- 弹窗 -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
const KEY = "56";

const login = document.getElementById("login");
const main = document.getElementById("main");
const past = document.getElementById("past");
const input = document.getElementById("key");
const modal = document.getElementById("modal");
const modalTime = document.getElementById("modal-time");
const modalContent = document.getElementById("modal-content");

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    main.style.display = "block";
  } else if (input.value.length === 4) {
    alert("密钥错误");
    input.value = "";
  }
});

function openModal(time, content) {
  modalTime.innerText = time;
  modalContent.innerText = content;
  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none";
  main.style.display = "block";
}
</script>

</body>
</html>
