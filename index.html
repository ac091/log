<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
  cursor: default;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 导航页（✅ 全新） ===== */
#nav {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 70%);
  z-index: 50;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}

/* 星空粒子背景 */
#nav::before {
  content: "";
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(56,189,248,.8), transparent),
    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 20% 70%, rgba(56,189,248,.6), transparent),
    radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 40% 85%, rgba(56,189,248,.5), transparent),
    radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,.5), transparent);
  pointer-events: none;
  z-index: 0;
}

.nav-title {
  font-size: 14px;
  letter-spacing: 8px;
  color: rgba(255,255,255,.3);
  margin-bottom: 60px;
  z-index: 1;
}

.nav-grid {
  display: flex;
  gap: 60px;
  z-index: 1;
}

.nav-item {
  width: 260px;
  height: 180px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 6px;
  color: #7dd3fc;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(56,189,248,.25);
  border-radius: 16px;
  cursor: pointer;
  transition: all .4s ease;
  position: relative;
  overflow: hidden;
}

.nav-item::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(56,189,248,.1), transparent);
  opacity: 0;
  transition: opacity .4s ease;
}

.nav-item:hover::before {
  opacity: 1;
}

.nav-item:hover {
  transform: translateY(-8px);
  border-color: rgba(56,189,248,.7);
  box-shadow: 
    0 0 40px rgba(56,189,248,.3),
    0 0 80px rgba(56,189,248,.15),
    inset 0 0 40px rgba(56,189,248,.05);
}

.nav-item span {
  position: relative;
  z-index: 2;
}

.nav-item .sub {
  position: absolute;
  bottom: 16px;
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(255,255,255,.25);
  z-index: 2;
}

/* ===== 现在时间段（✅ 纵向时间轴） ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #1e293b, #0f172a);
  z-index: 10;
  padding: 60px 80px;
  overflow: hidden;
}

.main-header {
  font-size: 13px;
  opacity: .6;
  margin-bottom: 20px;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.main-header .back-btn {
  cursor: pointer;
  color: #475569;
  font-size: 13px;
  letter-spacing: 2px;
  transition: color .3s ease;
}

.main-header .back-btn:hover {
  color: #38bdf8;
}

.timeline-now {
  position: relative;
  width: 100%;
  height: calc(100vh - 120px);
  overflow-y: auto;
  scroll-behavior: smooth;
}

.timeline-now::-webkit-scrollbar {
  width: 6px;
}

.timeline-now::-webkit-scrollbar-thumb {
  background: rgba(56,189,248,.3);
  border-radius: 3px;
}

/* 中轴线 */
.timeline-now::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom,
    rgba(56,189,248,.6),
    rgba(56,189,248,.1)
  );
  pointer-events: none;
}

.timeline-item {
  position: relative;
  width: 100%;
  padding: 30px 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #38bdf8;
  box-shadow: 0 0 20px rgba(56,189,248,.8);
  cursor: pointer;
  transition: transform .3s ease, box-shadow .3s ease;
  z-index: 2;
  flex-shrink: 0;
}

.dot:hover {
  transform: scale(1.5);
  box-shadow: 0 0 35px rgba(56,189,248,1);
}

.label {
  position: absolute;
  font-size: 20px;
  font-weight: 700;
  color: #7dd3fc;
  opacity: .7;
  transition: opacity .3s ease;
  cursor: pointer;
  z-index: 2;
}

.label:hover {
  opacity: 1;
}

.timeline-item:nth-child(odd) .dot {
  order: 2;
}

.timeline-item:nth-child(odd) .label {
  order: 1;
  right: calc(50% + 30px);
}

.timeline-item:nth-child(even) .dot {
  order: 1;
}

.timeline-item:nth-child(even) .label {
  order: 2;
  left: calc(50% + 30px);
}

/* ===== 过去时间段 ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0b0f1a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 50px;
}

.memory {
  position: relative;
  width: 280px;
  padding: 24px;
  background: rgba(255,255,255,.06);
  border-radius: 14px;
  cursor: pointer;
  transform: rotateX(10deg) scale(.95);
  transition: all .5s ease;
  opacity: .65;
}

.memory:hover {
  transform: rotateX(0) scale(1);
  opacity: 1;
  background: rgba(255,255,255,.12);
  box-shadow: 0 20px 60px rgba(56,189,248,.25);
}

.memory-date {
  font-size: 32px;
  font-weight: 800;
  color: #38bdf8;
}

.memory-tag {
  font-size: 14px;
  color: #94a3b8;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(10px);
  transition: all .4s ease;
}

.memory:hover .memory-tag {
  opacity: 1;
  transform: translateY(0);
}

/* ===== 模态框 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px 36px;
  border-radius: 12px;
  width: 90%;
  max-width: 460px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.modal-content {
  font-size: 15px;
  line-height: 1.8;
  color: #cbd5e1;
}

.camera {
  margin-top: 18px;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 22px;
}

/* ===== 相册 ===== */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
}

#album-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

.gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}

/* ===== 打字机 ===== */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 500;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* ===== 6.4 ===== */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 501;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#entry .entry-box {
  font-size: 100px;
  font-weight: 950;
  color: #38bdf8;
  text-shadow:
    0 0 20px rgba(56,189,248,.8),
    0 0 60px rgba(56,189,248,.5),
    0 0 120px rgba(56,189,248,.3);
  animation: pulse 2.5s infinite;
  transition: transform .3s ease;
}

#entry:hover .entry-box {
  transform: scale(1.08);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

/* ===== 生日 ===== */
#birthday {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 600;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#cake {
  font-size: 260px;
  opacity: 0;
  transition: opacity 1.8s ease;
}

#happy {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 64px;
  letter-spacing: 16px;
  color: #ffd1dc;
  opacity: 0;
  transition: opacity 2s ease;
  text-align: center;
}

#message {
  position: absolute;
  top: 26%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  color: #7dd3fc;
  opacity: 0;
  text-align: center;
  max-width: 80%;
  line-height: 1.8;
}

#closeHint {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<div id="typewriter"></div>

<div id="entry" onclick="startBirthday()">
  <div class="entry-box">6.4</div>
</div>

<!-- ✅ 导航页 -->
<div id="nav">
  <div class="nav-title">SELECT TIMELINE</div>
  <div class="nav-grid">
    <div class="nav-item" onclick="goToMain()">
      <span>现 在</span>
      <div class="sub">RECENT LOGS</div>
    </div>
    <div class="nav-item" onclick="goToPast()">
      <span>过 去</span>
      <div class="sub">MEMORY</div>
    </div>
  </div>
</div>

<div id="birthday">
  <div id="cake">🎂</div>
  <div id="happy">生日快乐</div>
  <div id="message"></div>
  <div id="closeHint" onclick="closeBirthday()">✕</div>
</div>

<!-- ✅ 现在时间段 -->
<div id="main">
  <div class="main-header">
    RECENT LOGS
    <span class="back-btn" onclick="goToNav()">◀ BACK</span>
  </div>
  <div class="timeline-now" id="timelineNow"></div>
</div>

<!-- ✅ 过去时间段 -->
<div id="past">
  <div class="past-header" onclick="goToNav()">◀ BACK</div>
  <div class="timeline">
    <div class="memory" onclick="openModal('2023-09-11','在武警院我们相遇。不管过去多久我还是想说，很高兴认识你。')">
      <div class="memory-date">2023-09-11</div>
      <div class="memory-tag">初见</div>
    </div>
    <div class="memory" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="memory-date">2023-06-15</div>
      <div class="memory-tag">未知</div>
    </div>
  </div>
</div>

<div id="album">
  <div id="album-page"></div>
  <div class="album-btn" style="left:20px;" onclick="prevImg()">‹</div>
  <div style="display:flex;justify-content:center;align-items:center;height:100%;">
    <img src="">
  </div>
  <div class="album-btn" style="right:20px;" onclick="nextImg()">›</div>
  <div id="album-close" onclick="closeAlbum()">✕</div>
</div>

<div class="gate" onclick="goToPast()"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
/* ===== 时间轴数据 ===== */
const timelineData = [
  {
    date: "2026-06-01",
    content: "系统开始记录新的轨迹。"
  },
  {
    date: "2026-05-25",
    content: "今天这个小网站正式可以运行了，好有成就感。这是我做的第一个网站，也是第一次正儿八经跑代码，惊喜吧应该，其实这个想法不算突然，只是没法确定代码可以跑起来，可我前两天还是决定先悄悄藏在戒指上，你应该暂时发现不了，上次的八千字讲了很多人很多事，但我想说那并不是全部，这个网站会保持更新的，也会有很多可以探索的地方，这个网站，只关于你，也只属于我们。"
  },
  {
    date: "2024-06-04",
    content: "首先祝你生日快乐"
  }
];

/* ===== 动态生成时间轴 ===== */
function renderTimeline() {
  const container = document.getElementById("timelineNow");
  container.innerHTML = "";

  timelineData.forEach((item) => {
    const div = document.createElement("div");
    div.className = "timeline-item";
    div.innerHTML = `
      <div class="dot" onclick="openModal('${item.date}','${item.content.replace(/'/g, "\\'")}')"></div>
      <div class="label" onclick="openModal('${item.date}','${item.content.replace(/'/g, "\\'")}')">${item.date}</div>
    `;
    container.appendChild(div);
  });

  container.scrollTop = 0;
}

/* ===== 导航跳转 ===== */
function goToNav() {
  document.getElementById("main").style.display = "none";
  document.getElementById("past").style.display = "none";
  document.getElementById("nav").style.display = "flex";
}

function goToMain() {
  document.getElementById("nav").style.display = "none";
  document.getElementById("main").style.display = "block";
  renderTimeline();
}

function goToPast() {
  document.getElementById("nav").style.display = "none";
  document.getElementById("past").style.display = "block";
}

/* ===== 原有 JS ===== */
const KEY = "56";
const login = document.getElementById("login");
const input = document.getElementById("key");
const modal = document.getElementById("modal");
const modalTime = document.getElementById("modal-time");
const modalContent = document.getElementById("modal-content");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && input.value !== KEY) {
    alert("密钥错误");
    input.value = "";
  }
});

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      playTypewriter();
    } else {
      goToNav();
    }
  }
});

const photosByDate = {
  "2023-09-11": [
    "https://raw.githubusercontent.com/ac091/log/main/qu.jpg",
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ],
  "2023-06-15": [
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ]
};

let currentPhotos = [];
let currentIndex = 0;

function openModal(time, content) {
  modalTime.innerText = time;
  modalContent.innerHTML = content;

  if (photosByDate[time]) {
    const camera = document.createElement("div");
    camera.className = "camera";
    camera.innerHTML = "📷";
    camera.onclick = () => openAlbum(photosByDate[time]);
    modalContent.appendChild(camera);
  }

  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

function openAlbum(photos) {
  currentPhotos = photos;
  currentIndex = 0;
  document.querySelector("#album img").src = currentPhotos[currentIndex];
  document.getElementById("album-page").innerText =
    (currentIndex + 1) + " / " + currentPhotos.length;
  document.getElementById("album").style.display = "block";
}

function prevImg() {
  if (currentIndex > 0) {
    currentIndex--;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function nextImg() {
  if (currentIndex < currentPhotos.length - 1) {
    currentIndex++;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function closeAlbum() {
  document.getElementById("album").style.display = "none";
}

/* ===== 打字机 & 生日 ===== */
const tw = document.getElementById("typewriter");
const typeSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-typewriter-key-1368.mp3");
typeSound.volume = 0.3;

function playTypewriter() {
  tw.style.display = "flex";

  typeText("这近三年来最美好的事是什么？", () => {
    setTimeout(() => eraseText(() => {
      typeText("想想就会发现根本想不完。", () => {
        setTimeout(() => {
          tw.style.display = "none";
          if (!localStorage.getItem("asked")) {
            document.getElementById("entry").style.display = "flex";
          } else {
            goToNav();
          }
        }, 1800);
      });
    }), 1400);
  });
}

function typeText(text, cb) {
  let i = 0;
  tw.innerHTML = "";
  const timer = setInterval(() => {
    tw.innerHTML += text.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= text.length) {
      clearInterval(timer);
      cb();
    }
  }, 130);
}

function eraseText(cb) {
  const timer = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(timer);
      cb();
    }
  }, 70);
}

const cake = document.getElementById("cake");
const happy = document.getElementById("happy");
const message = document.getElementById("message");
const closeHint = document.getElementById("closeHint");

function startBirthday() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("birthday").style.display = "flex";

  setTimeout(() => cake.style.opacity = "1", 300);
  setTimeout(() => cake.style.opacity = "0", 3300);
  setTimeout(() => happy.style.opacity = "1", 4300);
  setTimeout(() => happy.style.opacity = "0", 7800);
  setTimeout(() => typeMessage("首先祝你生日快乐"), 9800);
}

function typeMessage(text) {
  let i = 0;
  message.style.opacity = "1";
  const timer = setInterval(() => {
    message.innerHTML += text.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= text.length) {
      clearInterval(timer);
      closeHint.style.display = "block";
    }
  }, 200);
}

function closeBirthday() {
  document.getElementById("birthday").style.display = "none";
  goToNav();
  localStorage.setItem("asked", "1");
}

/* ===== 初始渲染 ===== */
renderTimeline();
</script>

</body>
</html>
