<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0b0b0b;
  color: #d1d5db;
  overflow: hidden;
  cursor: default;
}

/* ===== 登录 ===== */
#login {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

.login-inner {
  width: 420px;
  text-align: center;
}

.login-inner p {
  font-size: 12px;
  letter-spacing: 4px;
  opacity: .4;
  margin-bottom: 35px;
}

input.key {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 10px;
  outline: none;
}

/* ===== 现在时间段（✅ 时间流 / 信号节点） ===== */
#main {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #1e293b, #334155);
  z-index: 10;
  padding: 60px 80px;
  overflow: hidden;
}

.main-header {
  font-size: 13px;
  opacity: .6;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.timeline-now {
  position: relative;
  width: 100%;
  height: calc(100vh - 160px);
}

/* 时间光带 */
.line {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* 节点 */
.node {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #38bdf8;
  box-shadow: 0 0 20px rgba(56,189,248,.8);
  transition: transform .3s ease;
}

.node:hover .dot {
  transform: scale(1.6);
}

.label {
  margin-top: 12px;
  font-size: 18px;
  color: #7dd3fc;
  opacity: .6;
  transition: opacity .3s ease;
}

.node:hover .label {
  opacity: 1;
}

/* 节点位置（以后照抄就行） */
.n1 { left: 5%; top: 75%; }
.n2 { left: 45%; top: 50%; }
.n3 { left: 80%; top: 20%; }

/* ===== 过去时间段（✅ 你喜欢的残影） ===== */
#past {
  display: none;
  position: fixed;
  inset: 0;
  background: #0b0f1a;
  z-index: 200;
  padding: 60px 80px;
  overflow-y: auto;
}

.past-header {
  font-size: 13px;
  color: #475569;
  margin-bottom: 50px;
  cursor: pointer;
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 50px;
}

.memory {
  position: relative;
  width: 280px;
  padding: 24px;
  background: rgba(255,255,255,.06);
  border-radius: 14px;
  cursor: pointer;
  transform: rotateX(10deg) scale(.95);
  transition: all .5s ease;
  opacity: .65;
}

.memory:hover {
  transform: rotateX(0) scale(1);
  opacity: 1;
  background: rgba(255,255,255,.12);
  box-shadow: 0 20px 60px rgba(56,189,248,.25);
}

.memory-date {
  font-size: 32px;
  font-weight: 800;
  color: #38bdf8;
}

.memory-tag {
  font-size: 14px;
  color: #94a3b8;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(10px);
  transition: all .4s ease;
}

.memory:hover .memory-tag {
  opacity: 1;
  transform: translateY(0);
}

/* ===== 模态框 ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 999;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px 36px;
  border-radius: 12px;
  width: 90%;
  max-width: 460px;
  max-height: 70vh;
  overflow-y: auto;
}

.modal-time {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.modal-content {
  font-size: 15px;
  line-height: 1.8;
  color: #cbd5e1;
}

.camera {
  margin-top: 18px;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 22px;
}

/* ===== 相册 ===== */
#album {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 3000;
}

#album img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}

.album-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
}

#album-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

#album-page {
  position: absolute;
  top: 20px;
  left: 30px;
  color: #fff;
  font-size: 14px;
}

.gate {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 10px;
  height: 10px;
  background: rgba(56,189,248,.5);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
}

/* ===== 打字机 ===== */
#typewriter {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 500;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  letter-spacing: 2px;
  color: #7dd3fc;
  padding: 40px;
  text-align: center;
}

/* ===== 6.4 ===== */
#entry {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 501;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#entry .entry-box {
  font-size: 100px;
  font-weight: 950;
  color: #38bdf8;
  text-shadow:
    0 0 20px rgba(56,189,248,.8),
    0 0 60px rgba(56,189,248,.5),
    0 0 120px rgba(56,189,248,.3);
  animation: pulse 2.5s infinite;
  transition: transform .3s ease;
}

#entry:hover .entry-box {
  transform: scale(1.08);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

/* ===== 生日 ===== */
#birthday {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 600;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#cake {
  font-size: 260px;
  opacity: 0;
  transition: opacity 1.8s ease;
}

#happy {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 64px;
  letter-spacing: 16px;
  color: #ffd1dc;
  opacity: 0;
  transition: opacity 2s ease;
  text-align: center;
}

#message {
  position: absolute;
  top: 26%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  color: #7dd3fc;
  opacity: 0;
  text-align: center;
  max-width: 80%;
  line-height: 1.8;
}

#closeHint {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div id="login">
  <div class="login-inner">
    <p>SYSTEM SECURED</p>
    <input class="key" id="key" type="password" maxlength="4" placeholder="KEY">
  </div>
</div>

<div id="typewriter"></div>

<div id="entry" onclick="startBirthday()">
  <div class="entry-box">6.4</div>
</div>

<div id="birthday">
  <div id="cake">🎂</div>
  <div id="happy">生日快乐</div>
  <div id="message"></div>
  <div id="closeHint" onclick="closeBirthday()">✕</div>
</div>

<!-- ✅ 现在时间段 -->
<div id="main">
  <div class="main-header">RECENT LOGS</div>
  <div class="timeline-now">
    <svg class="line" viewBox="0 0 1000 300">
      <defs>
        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
          <stop offset="50%" stop-color="#38bdf8"/>
          <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M0,250 C300,200 700,100 1000,50"
            stroke="url(#glow)"
            stroke-width="2"
            fill="none"/>
    </svg>

    <div class="node n1" onclick="openModal('2026-05-25','今天这个小网站正式可以运行了，好有成就感。这是我做的第一个网站，也是第一次正儿八经跑代码，惊喜吧应该，其实这个想法不算突然，只是没法确定代码可以跑起来，可我前两天还是决定先悄悄藏在戒指上，你应该暂时发现不了，上次的八千字讲了很多人很多事，但我想说那并不是全部，这个网站会保持更新的，也会有很多可以探索的地方，这个网站，只关于你，也只属于我们。')">
      <div class="dot"></div>
      <div class="label">2026-05-25</div>
    </div>

    <div class="node n2" onclick="openModal('2026-06-01','系统开始记录新的轨迹。')">
      <div class="dot"></div>
      <div class="label">2026-06-01</div>
    </div>

    <div class="node n3" onclick="openModal('2024-06-04','首先祝你生日快乐')">
      <div class="dot"></div>
      <div class="label">2024-06-04</div>
    </div>
    <div class="node n4" onclick="openModal('2024-06-07','不需要')">
      <div class="dot"></div>
      <div class="label">2024-06-07</div>
    </div>
  </div>
</div>

<!-- ✅ 过去时间段 -->
<div id="past">
  <div class="past-header" onclick="closePast()">◀ BACK</div>
  <div class="timeline">
    <div class="memory" onclick="openModal('2023-09-11','在武警院我们相遇。不管过去多久我还是想说，很高兴认识你。')">
      <div class="memory-date">2023-09-11</div>
      <div class="memory-tag">初见</div>
    </div>
    <div class="memory" onclick="openModal('2023-06-15','那时候我们还不知道，后来会发生这么多事。')">
      <div class="memory-date">2023-06-15</div>
      <div class="memory-tag">未知</div>
    </div>
  </div>
</div>

<div id="album">
  <div id="album-page"></div>
  <div class="album-btn" style="left:20px;" onclick="prevImg()">‹</div>
  <div style="display:flex;justify-content:center;align-items:center;height:100%;">
    <img src="">
  </div>
  <div class="album-btn" style="right:20px;" onclick="nextImg()">›</div>
  <div id="album-close" onclick="closeAlbum()">✕</div>
</div>

<div class="gate" onclick="openPast()"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
/* ===== JS 完全不动 ===== */
const KEY = "56";
const login = document.getElementById("login");
const main = document.getElementById("main");
const past = document.getElementById("past");
const input = document.getElementById("key");
const modal = document.getElementById("modal");
const modalTime = document.getElementById("modal-time");
const modalContent = document.getElementById("modal-content");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && input.value !== KEY) {
    alert("密钥错误");
    input.value = "";
  }
});

input.addEventListener("input", () => {
  if (input.value === KEY) {
    login.style.display = "none";
    if (!localStorage.getItem("asked")) {
      playTypewriter();
    } else {
      main.style.display = "block";
    }
  }
});

const photosByDate = {
  "2023-09-11": [
    "https://raw.githubusercontent.com/ac091/log/main/qu.jpg",
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ],
  "2023-06-15": [
    "https://raw.githubusercontent.com/ac091/log/main/yi.jpg"
  ]
};

let currentPhotos = [];
let currentIndex = 0;

function openModal(time, content) {
  modalTime.innerText = time;
  modalContent.innerHTML = content;

  if (photosByDate[time]) {
    const camera = document.createElement("div");
    camera.className = "camera";
    camera.innerHTML = "📷";
    camera.onclick = () => openAlbum(photosByDate[time]);
    modalContent.appendChild(camera);
  }

  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

function openPast() {
  main.style.display = "none";
  past.style.display = "block";
}

function closePast() {
  past.style.display = "none";
  main.style.display = "block";
}

function openAlbum(photos) {
  currentPhotos = photos;
  currentIndex = 0;
  document.querySelector("#album img").src = currentPhotos[currentIndex];
  document.getElementById("album-page").innerText =
    (currentIndex + 1) + " / " + currentPhotos.length;
  document.getElementById("album").style.display = "block";
}

function prevImg() {
  if (currentIndex > 0) {
    currentIndex--;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function nextImg() {
  if (currentIndex < currentPhotos.length - 1) {
    currentIndex++;
    document.querySelector("#album img").src = currentPhotos[currentIndex];
    document.getElementById("album-page").innerText =
      (currentIndex + 1) + " / " + currentPhotos.length;
  }
}

function closeAlbum() {
  document.getElementById("album").style.display = "none";
}

/* ===== 打字机 & 生日 ===== */
const tw = document.getElementById("typewriter");
const typeSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-typewriter-key-1368.mp3");
typeSound.volume = 0.3;

function playTypewriter() {
  tw.style.display = "flex";

  typeText("这近三年来最美好的事是什么？", () => {
    setTimeout(() => eraseText(() => {
      typeText("想想就会发现根本想不完。", () => {
        setTimeout(() => {
          tw.style.display = "none";
          if (!localStorage.getItem("asked")) {
            document.getElementById("entry").style.display = "flex";
          } else {
            main.style.display = "block";
          }
        }, 1800);
      });
    }), 1400);
  });
}

function typeText(text, cb) {
  let i = 0;
  tw.innerHTML = "";
  const timer = setInterval(() => {
    tw.innerHTML += text.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= text.length) {
      clearInterval(timer);
      cb();
    }
  }, 130);
}

function eraseText(cb) {
  const timer = setInterval(() => {
    tw.innerHTML = tw.innerHTML.slice(0, -1);
    if (!tw.innerHTML.length) {
      clearInterval(timer);
      cb();
    }
  }, 70);
}

const cake = document.getElementById("cake");
const happy = document.getElementById("happy");
const message = document.getElementById("message");
const closeHint = document.getElementById("closeHint");

function startBirthday() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("birthday").style.display = "flex";

  setTimeout(() => cake.style.opacity = "1", 300);
  setTimeout(() => cake.style.opacity = "0", 3300);
  setTimeout(() => happy.style.opacity = "1", 4300);
  setTimeout(() => happy.style.opacity = "0", 7800);
  setTimeout(() => typeMessage("首先祝你生日快乐"), 9800);
}

function typeMessage(text) {
  let i = 0;
  message.style.opacity = "1";
  const timer = setInterval(() => {
    message.innerHTML += text.charAt(i++);
    typeSound.currentTime = 0;
    typeSound.play();
    if (i >= text.length) {
      clearInterval(timer);
      closeHint.style.display = "block";
    }
  }, 200);
}

function closeBirthday() {
  document.getElementById("birthday").style.display = "none";
  main.style.display = "block";
  localStorage.setItem("asked", "1");
}
</script>

</body>
</html>
